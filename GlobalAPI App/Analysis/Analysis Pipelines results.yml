                      "ko_kr": "피부 표면의 매끄러움이 둔화된 상태입니다.\n피부 턴 오버를 촉진시켜 피부 표면에 남아 있는 오래된 각질 등을 제거하고, 수분이 유지되는 상태로 관리해 주세요.",
                      "es_es": "",
                      "vi_vn": "Da bạn đang có dấu hiệu thô ráp. Chúng tôi khuyên bạn nên tập trung vào việc thúc đẩy chu kì tái tạo da khỏe mạnh đồng thời loại bỏ các tế bào sừng cũ và các chất tích tụ khác để tăng cường khả năng giữ ẩm.",
                      "fr_fr": "",
                      "fr_ca": "",
                      "it_it": "",
                      "pt_pt": "",
                      "pt_br": "",
                      "de_de": "",
                      "nl_nl": "",
                      "ru_ru": "",
                      "el_gr": "",
                      "th_th": "ผิวของคุณแสดงสัญญาณของความหยาบกร้าน เราแนะนำให้ใช้ผลิตภัณฑ์ดูแลผิวที่เน้นการส่งเสริมการผลัดเซลล์ผิวที่มีสุขภาพดี ในขณะเดียวกันก็ช่วยขจัดเซลล์เคราตินเก่าและสิ่งสะสมอื่น ๆ เพื่อเพิ่มการกักเก็บความชุ่มชื้น",
                      "ms_my": "Kulit anda menunjukkan tanda-tanda kekasaran. Kami mencadangkan produk penjagaan kulit yang mempromosikan peralihan kulit yang sihat sambil menghilangkan keratinosit lama dan penumpukan lain untuk meningkatkan pengekalan kelembapan.",
                      "ar_sa": "",
                      "ar_ae": "تظهر على بشرتكِ علامات الخشونة. لذا نوصي باتباع نظام للعناية بالبشرة يركز على تعزيز التجديد الصحي للخلايا مع إزالة الخلايا الكيراتينية القديمة والتراكمات الأخرى من أجل تعزيز الاحتفاظ بالترطيب.",
                      "mn_mn": "",
                      "my_mm": "",
                      "si_lk": "",
                      "id_id": "Kulit Anda menunjukkan tanda-tanda kekasaran. Kami merekomendasikan perawatan kulit yang difokuskan pada peningkatan pergantian sel kulit yang sehat sekaligus menghilangkan keratinosit lama dan timbunan lainnya untuk meningkatkan retensi kelembapan."
                  },
                  "vis5Dryness": {
                      "en_us": "Your skin has difficulty retaining moisture and oils. To address this, we recommend using a moisture-rich lotion to hydrate from within, followed by a cream to lock in hydration for longer-lasting moisture.",
                      "ja_jp": "肌の水分・油分を保持しにくい状態です。肌の乾燥を予防するために保湿効果の高いローションで肌内部を水分で満たし、その上からクリームでラップするように長時間肌にうるおを保つことができる状態にしましょう。",
                      "en_gb": "",
                      "en_ca": "",
                      "en_au": "",
                      "en_ph": "Your skin has trouble retaining moisture and oils. To improve this, we recommend using a moisture-rich lotion to hydrate deeply, followed by a cream to seal in the moisture for long-lasting hydration.",
                      "en_my": "Your skin has difficulty retaining moisture and oils. To address this, we recommend using a moisture-rich lotion to hydrate from within, followed by a cream to lock in hydration for longer-lasting moisture.",
                      "en_sg": "Your skin has difficulty retaining moisture and oils. To address this, we recommend using a moisture-rich lotion to hydrate from within, followed by a cream to lock in hydration for longer-lasting moisture.",
                      "zh_cn": "",
                      "zh_hk": "你的肌膚十分乾燥，正處於水油失衡的狀態。\n\n建議你可使用滋潤肌膚及鎖緊水份，持久補濕，維持水油平衡，提升細胞修復和再生機能的護膚產品。\n",
                      "zh_tw": "您的肌膚難以保持水分和油分。\n為了解決這個問題，建議您使用富含水分的乳液來深入保濕，再使用乳霜鎖住水分，保持長時間的水潤感。",
                      "ko_kr": "피부에 필요한 수분, 유분을 유지하기 어려운 상태입니다. 피부 건조를 예방하기 위해 보습 효과가 높은 로션(에멀전)으로 피부 내부를 수분으로 채우고, 그 위에서 크림으로 랩핑하듯 케어하여 장시간 피부에 촉촉함을 유지할 수 있는 상태로 만들어 주세요.",
                      "es_es": "",
                      "vi_vn": "Da bạn khó giữ được độ ẩm và dầu. Để giải quyết vấn đề này, chúng tôi khuyên bạn nên sử dụng kem dưỡng da giàu độ ẩm để cấp ẩm từ bên trong, sau đó dùng kem khóa ẩm để giữ ẩm lâu hơn.",
                      "fr_fr": "",
                      "fr_ca": "",
                      "it_it": "",
                      "pt_pt": "",
                      "pt_br": "",
                      "de_de": "",
                      "nl_nl": "",
                      "ru_ru": "",
                      "el_gr": "",
                      "th_th": "ผิวของคุณไม่สามารถกักเก็บ ความชุ่มชื้นและน้ำมัน เพื่อแก้ไขปัญหานี้ เราแนะนำให้ใช้โลชั่นที่มีความชุ่มชื้นสูงเพื่อให้ความชุ่มชื้นจากภายใน ตามด้วยครีมเพื่อล็อคความชุ่มชื้นให้คงอยู่ในผิวได้ยาวนานขึ้น",
                      "ms_my": "Kulit anda sukar mengekalkan kelembapan dan minyak. Gunakan losen kaya kelembapan untuk hidrasi dari dalam, diikuti dengan krim untuk mengunci kelembapan lebih lama.",
                      "ar_sa": "",
                      "ar_ae": "تواجه بشرتكِ صعوبة في الاحتفاظ بالترطيب والزيوت. لحل هذه المشكلة، نوصي باستخدام غسول غني بالترطيب من أجل ترطيب البشرة من الداخل، متبوعاً بكريم يمنع البشرة من فقدان الترطيب ومن ثم يدوم لفترة أطول.",
                      "mn_mn": "",
                      "my_mm": "",
                      "si_lk": "",
                      "id_id": "Kulit Anda sulit mempertahankan kelembapan dan minyak. Untuk mengatasinya, kami sarankan untuk menggunakan losion yang kaya akan kelembapan untuk menghidrasi dari dalam, diikuti dengan krim untuk mengunci kelembapan agar kelembapan bertahan lebih lama."
                  },
                  "vis5VisiblePores": {
                      "en_us": "Your pores may be clogged with sebum and impurities. We recommend thorough cleansing to remove buildup, along with skincare that focuses on maintaining proper hydration and oil balance.",
                      "ja_jp": "毛穴に皮脂や汚れがつまりざらついている可能性があります。\n丁寧な洗顔で、毛穴につまった皮脂や汚れを取り除き、皮脂と水分のバランスをコントロールするスキンケアでお手入れをしましょう。",
                      "en_gb": "",
                      "en_ca": "",
                      "en_au": "",
                      "en_ph": "Your pores may be clogged with sebum and impurities. We recommend a thorough cleansing routine to remove any buildup, alongside skincare that helps maintain a proper balance of hydration and oil.",
                      "en_my": "Your pores may be clogged with sebum and impurities. We recommend thorough cleansing to remove buildup, along with skincare that focuses on maintaining proper hydration and oil balance.",
                      "en_sg": "Your pores may be clogged with sebum and impurities. We recommend thorough cleansing to remove buildup, along with skincare that focuses on maintaining proper hydration and oil balance.",
                      "zh_cn": "",
                      "zh_hk": "你肌膚的毛孔有明顯阻塞的煩惱。\n\n建議你使用能徹底潔淨毛孔污垢和皮脂的潔膚產品，同時又能滋潤保濕的護膚品。",
                      "zh_tw": "您的毛孔可能被皮脂和雜質堵塞。\n建議您徹底清潔肌膚，去除堆積物，並使用專注於保持適當水分和油脂平衡的護膚品。",
                      "ko_kr": "모공에 피지가 쌓이거나 노폐물이 배출되지 못해서 막혀 있을 가능성이 있습니다.\n꼼꼼한 세안으로 모공에 쌓인 피지와 노폐물을 제거하고 피지와 수분의 균형을 맞추는 스킨케어로 손질해 주세요.",
                      "es_es": "",
                      "vi_vn": "Lỗ chân lông của bạn có thể bị tắc nghẽn do bã nhờn và tạp chất. Chúng tôi khuyên bạn nên thực hiện bước rửa mặt thật kỹ lưỡng để loại bỏ chất bẩn tích tụ, kết hợp với việc tập trung vào việc duy trì độ ẩm và cân bằng dầu thích hợp. ",
                      "fr_fr": "",
                      "fr_ca": "",
                      "it_it": "",
                      "pt_pt": "",
                      "pt_br": "",
                      "de_de": "",
                      "nl_nl": "",
                      "ru_ru": "",
                      "el_gr": "",
                      "th_th": "รูขุมขนของคุณอาจอุดตันจากซีบัมและสิ่งสกปรก เราแนะนำให้ทำความสะอาดอย่างล้ำลึกเพื่อขจัดสิ่งอุดตัน พร้อมกับใช้ผลิตภัณฑ์ดูแลผิวที่เน้นการรักษาความชุ่มชื้นและสมดุลของน้ำมันอย่างเหมาะสม",
                      "ms_my": "Liang pori anda mungkin tersumbat dengan sebum dan kekotoran. Lakukan pembersihan menyeluruh dan gunakan produk penjagaan kulit yang mengekalkan hidrasi dan keseimbangan minyak.",
                      "ar_sa": "",
                      "ar_ae": "قد تكون مسامك مسدودة بالدهون والشوائب. لذا نوصي بتنظيف البشرة بعمق لإزالة الشوائب المتراكمة، بالإضافة إلى استخدام منتجات للعناية بالبشرة تركز على الحفاظ على الترطيب المناسب وتوازن الزيوت.",
                      "mn_mn": "",
                      "my_mm": "",
