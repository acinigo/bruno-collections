              "explanations": {
                  "vis4Radiance": {
                      "en_us": "Your radiance score is not at its best. To improve it, protect your skin from UV rays, and enhance beauty circulation with appropriate skincare.",
                      "ja_jp": "あなたの透明感あふれる輝きスコアはやや低めです。\n紫外線から肌を守る適切なスキンケアをおすすめします",
                      "en_gb": "",
                      "en_ca": "",
                      "en_au": "",
                      "en_ph": "Your radiance score is not at its best. To improve it, protect your skin from UV rays, and enhance beauty circulation with appropriate skincare.",
                      "en_my": "Your radiance score is not at its best. To improve it, protect your skin from UV rays, and enhance beauty circulation with appropriate skincare.",
                      "en_sg": "Your radiance score is not at its best. To improve it, protect your skin from UV rays, and enhance beauty circulation with appropriate skincare.",
                      "zh_cn": "",
                      "zh_hk": "你肌膚的光澤度未及理想。建議選擇合適自己的護膚方案，重點提升肌底微循環和預防紫外線對肌膚造成傷害。",
                      "zh_tw": "您肌膚的透明感偏低。\n建議您預防紫外線的傷害，並加強適合自己的護膚保養方法。",
                      "ko_kr": "당신의 피부 광채 점수는 다소 낮습니다. 자외선으로부터 피부를 보호하고 적절한 스킨케어를 하는 것을 추천합니다.",
                      "es_es": "",
                      "vi_vn": "Độ rạng rỡ của làn da hiện tại chưa đạt được mức tốt nhất. \nĐể cải thiện độ rạng rỡ của làn da, hãy bảo vệ da khỏi các tia UV và tăng cường phát huy khả năng tuần hoàn sắc đẹp bằng những sản phẩm phù hợp. ",
                      "fr_fr": "",
                      "fr_ca": "",
                      "it_it": "",
                      "pt_pt": "",
                      "pt_br": "",
                      "de_de": "",
                      "nl_nl": "",
                      "ru_ru": "",
                      "el_gr": "",
                      "th_th": "ระดับคะแนนความกระจ่างใสของผิวคุณอยู่ในเกณฑ์ปานกลาง การฟื้นบำรุงผิวควรเน้นการปกป้องผิวจากรังสี UV และ เสริมประสิทธิภาพ beauty circulation ของผิว ด้วยผลิตภัณฑ์บำรุงผิวที่เหมาะสม ",
                      "ms_my": "Skor seri anda tidak begitu baik.\nUntuk meningkatkan seri anda, Untuk memperbaikinya, lindungi kulit anda dari sinar UV, dan tingkatkan peredaran kecantikan dengan penjagaan kulit yang sesuai.",
                      "ar_sa": "",
                      "ar_ae": "درجة إشراق بشرتكم ليست في أفضل حالاتها. لتحسينها، قوموا بحماية بشرتكم من الأشعة ما فوق البنفسجية، والعمل على تعزيز الدورة الدموية لتحفيز الجمال الطبيعي من خلال مستحضرات العناية بالبشرة التي تناسبكم.",
                      "mn_mn": "",
                      "my_mm": "",
                      "si_lk": "",
                      "id_id": "Kejernihan cahaya kulit Anda tidak dalam kondisi terbaik. Untuk mengatasinya, lindungi kulit Anda dari sinar UV, dan tingkatkan sirkulasi kecantikan dengan perawatan kulit yang tepat."
                  },
                  "vis4Smoothness": {
                      "en_us": "Your smoothness score is not at its best.\nYour smoothness score can be improved by hydrating/moisturizing your skin with an appropriate skincare product(s). ",
                      "ja_jp": "あなたのなめらかさスコアはやや低めです。保湿効果の高いスキンケアをおすすめします",
                      "en_gb": "",
                      "en_ca": "",
                      "en_au": "",
                      "en_ph": "Your smoothness score is not at its best.\nYour smoothness score can be improved by hydrating/moisturizing your skin with an appropriate skincare product(s). ",
                      "en_my": "Your smoothness score is not at its best.\nYour smoothness score can be improved by hydrating/moisturizing your skin with an appropriate skincare product(s). ",
                      "en_sg": "Your smoothness score is not at its best.\nYour smoothness score can be improved by hydrating/moisturizing your skin with an appropriate skincare product(s). ",
                      "zh_cn": "",
                      "zh_hk": "你肌膚的柔滑度未及理想。\n為提升肌膚的細緻度，建議你使用高效保濕的護膚方案。",
                      "zh_tw": "您肌膚的細緻度偏低。\n若想提高肌膚的細緻度，建議您使用保濕效果佳的護膚保養方法。",
                      "ko_kr": "당신의 피부 매끄러움 점수는 약간 낮습니다. 매끄러운 피부를 위해서는 보습 효과가 높은 스킨케어로 수분을 유지하는 것을 추천합니다.",
                      "es_es": "",
                      "vi_vn": "Độ ẩm mượt của làn da hiện tại chưa đạt được mức tốt nhất. Để cải thiện, tăng cường dưỡng ẩm và duy trì khả năng giữ ẩm cao bằng những sản phẩm dưỡng da phù hợp.",
                      "fr_fr": "",
                      "fr_ca": "",
                      "it_it": "",
                      "pt_pt": "",
                      "pt_br": "",
                      "de_de": "",
                      "nl_nl": "",
                      "ru_ru": "",
                      "el_gr": "",
                      "th_th": "ระดับคะแนนความเรียบเนียนของผิวอยู่ในเกณฑ์ปานกลาง \nการฟื้นบำรุงผิวควรเน้นการเติมความชุ่มชื้นและเน้นการคงความชุ่มชื้นให้ผิวตลอดวัน ด้วยการเลือกใช้ผลิตภัณฑ์บำรุงผิวที่เหมาะสม ",
                      "ms_my": "Skor kelicinan anda tidak begitu baik.Untuk memperbaikinya, hidrat kulit anda dan jaga kelembapannya sepanjang hari dengan penjagaan kulit yang sesuai.",
                      "ar_sa": "",
                      "ar_ae": "درجة نعومة بشرتكم ليست في أفضل حالاتها.\nيمكن تحسين درجة نعومة البشرة عن طريق ترطيبها/ باستخدام منتج (منتجات) الترطيب المناسبة للعناية بالبشرة.",
                      "mn_mn": "",
                      "my_mm": "",
                      "si_lk": "",
                      "id_id": "Kehalusan kulit  Anda tidak dalam kondisi terbaik. \nHal ini dapat ditingkatkan dengan menghidrasi/melembabkan kulit Anda dengan produk perawatan kulit yang sesuai."
                  },
                  "vis4Resilience": {
                      "en_us": "Your resilience score is not at its best. \nYour resilience score can be improved by energizing your skin.  It is also affected by moisture level so please use an appropriate product(s) to energize and moisturize your skin. ",
                      "ja_jp": "あなたのハリ・弾力スコアはやや低めです。\n肌のうるおいレベルが不足していることがスコアに影響している場合もあるため、肌の状態に合わせた最適なスキンケアをおすすめします",
                      "en_gb": "",
                      "en_ca": "",
                      "en_au": "",
                      "en_ph": "Your resilience score is not at its best. \nYour resilience score can be improved by energizing your skin.  It is also affected by moisture level so please use an appropriate product(s) to energize and moisturize your skin. ",
                      "en_my": "Your resilience score is not at its best. \nYour resilience score can be improved by energizing your skin.  It is also affected by moisture level so please use an appropriate product(s) to energize and moisturize your skin. ",
                      "en_sg": "Your resilience score is not at its best. \nYour resilience score can be improved by energizing your skin.  It is also affected by moisture level so please use an appropriate product(s) to energize and moisturize your skin. ",
                      "zh_cn": "",
                      "zh_hk": "你的肌膚彈性未及理想。\n建議你就現時的肌膚狀態，針對性提升肌膚的再生力，由內而外改善肌膚彈性。",
                      "zh_tw": "您肌膚的彈力偏低。\n有可能是肌膚的水分不足而影響。建議根據您的肌膚狀況，大量補充水分並為肌膚提升能量，通過適當的護膚保養方法提升肌膚彈力。",
                      "ko_kr": "당신의 피부 탄력 점수는 약간 낮습니다.\n피부 탄력도는 피부의 수분 보유력과 연관이 깊기 때문에, 수분을 유지하면서 탄력을 증진시킬 수 있는 스킨케어법을 추천합니다.  ",
                      "es_es": "",
                      "vi_vn": "Độ đàn hồi của làn da hiện tại chưa đạt được mức tốt nhất. Thỉnh thoảng, da thiếu ẩm có thể gây ảnh hưởng tới độ đàn hồi của da. Để cải thiện, hãy cấp ẩm và tăng cường năng lượng cho da cũng như tăng độ đàn hồi cho làn da bằng những sản phẩm chăm sóc da phù hợp. ",
                      "fr_fr": "",
                      "fr_ca": "",
                      "it_it": "",
                      "pt_pt": "",
                      "pt_br": "",
                      "de_de": "",
                      "nl_nl": "",
                      "ru_ru": "",
                      "el_gr": "",
                      "th_th": "ระดับคะแนนความยืดหยุ่นของผิวอยู่ในเกณฑ์ปานกลาง เมื่อความชุ่มชื้ื้นภายในผิวไม่เพียงพออาจส่งผลต่อระดับความยืดหยุ่นของผิว แนะนำให้ฟื้นบำรุงผิวด้วยการเลือกใช้ผลิตภัณฑ์ที่ช่วยเติมความชุ่มชื้นพร้อมมอบพลังการบำรุงอย่างล้ำลึก ",
                      "ms_my": "Skor ketahanan kulit anda tidak begitu baik.Kadang-kadang kekurangan kelembapan boleh mempengaruhi skor ketahanan anda. Untuk memperbaikinya, menghidrat dan memberi tenaga pada kulit anda, serta menargetkan ketahanan dengan penjagaan kulit yang sesuai.",
                      "ar_sa": "",
                      "ar_ae": "درجة مرونة بشرتكم ليست في أفضل حالاتها.\nيمكن تحسين درجة المرونة هذه من خلال تنشيط البشرة وتحفيزها. كما وتتأثر البشرة بمستوى الرطوبة، لذا يرجى استخدام منتج (منتجات) مناسبة لتنشيط وترطيب البشرة.",
                      "mn_mn": "",
                      "my_mm": "",
                      "si_lk": "",
                      "id_id": "Kekenyalan kulit Anda tidak dalam kondisi terbaik. \nKekenyalan kulit dapat ditingkatkan dengan memberi energi pada kulit Anda. Hal ini juga dipengaruhi oleh tingkat kelembapan, jadi gunakan produk yang sesuai untuk memberi energi dan melembabkan kulit Anda."
