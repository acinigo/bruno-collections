opencollection: 1.0.0

info:
  name: GlobalAPI App

request:
  scripts:
    - type: before-request
      code: |-
        url = bru.getEnvVar("url");
        appId = bru.getEnvVar("appId");
        appSecret = bru.getEnvVar("appSecret");

        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        };

         const echoPostAppRequest = {
          url: `${url}/api/auth/app/login`,
           method: 'POST',
           headers: 'Content-Type:application/json',
           body: {
             mode: 'application/json',
             raw: JSON.stringify(
                 {
                 	appId: appId,
                     appSecret: appSecret
                 })
           }
         };


        await bru.sendRequest(echoPostAppRequest, async function(err, response) {
            a = response.data;
            bru.setEnvVar("acces_token_app", a.accessToken );
            bru.setEnvVar("tenantId", parseJwt(a.accessToken).tenantId);
        });
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
