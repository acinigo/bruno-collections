Count\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"NOT_AVAILABLE\",\"isOrderable\":false}}},{\"code\":\"4514254126745\",\"tags\":[],\"ja\":{\"name\":\"ビューティー ロンジェビティ コレクション\",\"shortDescription\":\"心地よく五感を満たすラグジュアリーなスキンケアステップで、肌本来の美しさを引き出すトータルケアセット、誕生。\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\">\\r\\n    <div class=\\\"row\\\" id=\\\"overview\\\">\\r\\n        <div class=\\\"z-content-wrap\\\">\\r\\n            <nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\">\\r\\n                <ul>\\r\\n                    <li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li>\\r\\n                    <li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li>\\r\\n                </ul>\\r\\n            </nav>\\r\\n            <div class=\\\"z-overview-content\\\"><a class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\" href=\\\"#z-tabcontent1\\\"><span>商品について</span></a>\\r\\n                <div class=\\\"pdp-content-section is-open\\\" id=\\\"z-tabcontent1\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-7 z-column\\\">\\r\\n                            <p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">日中の肌・夜の肌それぞれへの適切なケアによる総合的なアプローチで肌本来の美しさを引き出すスキンケアステップ「ビューティー ロンジェビティ システム」を体験できる数量限定品キット。肌にふれた瞬間、深いうるおいで包み込まれる心地よさ。リッチなテクスチャーと洗練された香りで心地よく五感を満たし、ハイクラスの満足感をもたらす洗顔フォーム、保湿液、3種のクリームを、贅沢に詰め込みました。資生堂独自の美肌のキー成分「スキンジェネセルENMEI」※を効率良く肌に届け、力強いハリとつやに満ちた肌へ導き、未来の肌までも美しく。過酷な肌環境にも揺らがない美しさを、毎日の基本ケアで育みます。\\r\\n</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\">※キメを整えてなめらかな肌にするとともに、肌あれが起きないようにする成分(エンメイソウ(ヒキオコシ)エキス、ピペリジンプロピオン酸、2-O-エチル-L-アスコルビン酸)。洗顔フォームを除く全アイテムに配合。</p>\\r\\n                        <ul class=\\\"overview-box__long-description__place_of_origin\\\"