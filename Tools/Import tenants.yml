box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>週に2～3回を目安に、モイスチャライザー（乳液・クリーム）の前にご使用ください。</li>\\r\\n                                    <li>マスクの上に重いものをのせたり、立てて保管しないでください。</li>\\r\\n                                    <li>袋から取り出したマスクはすぐにお使いください。衛生上、一度使用したマスクはくり返しお使いにならないでください。</li>\\r\\n                                    <li>マスクを顔にのせたまま、おやすみにならないでください。</li>\\r\\n                                    <li>マスクの液が目に入らないようご注意ください。もし入った場合は、すぐに水かぬるま湯で洗い流してください。</li>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>ご使用の際に液がたれ落ちることがありますので、衣服など汚さないようにご注意ください。</li>\\r\\n                                    <li>絆創膏、湿布などの刺激に弱い方は使用を避けてください。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\\r\\n\\r\\n<style>\\r\\n    @media(max-width: 768px) {\\r\\n        .pdp-page .z-overview-info-tabs #overview {\\r\\n            margin-bottom:0;\\r\\n        }\\r\\n</style>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw6e1dd8ae/products-02/16957/16957_S_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwf3a77a0b/products-02/16957/16957_S_02.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw782055d9/products-02/16957/16957_S_03.jpg\"],\"price\":{\"currency\":\"J