-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li class=\\\"z-komidashi\\\">バイタルパーフェクション リンクルリフト ディープレチノホワイト4</li>\\r\\n                                    <li>朝と夜のお手入れの最後に、小さなパール粒1コ分を指先にとり、目や口のまわりなど、しわが気になる部分にやさしくなじませます。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">朝お使いになる場合は、レチノールの効果を守るために、ご使用後に紫外線カット効果のある化粧品をお使いください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">バイタルパーフェクション リンクルリフト マスク レチノホワイト</li>\\r\\n                                    <li>おもて面の左下の角から袋を開き、シートを1枚ずつ取り、幅の広い方が目尻側にくるようにして貼ります。（シートに表裏はありません。） 約10分後、シートをはがしてください。肌に残った液はなじませてください。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                \\t<li class=\\\"z-komidashi\\\">バイタルパーフェクション リンクルリフト ディープレチノホワイト4</li>\\r\\n\\t                                <li>目の中に入らないようご注意ください。</li>\\r\\n\\t                                <li>ご使用後はチューブの口もとをきれいにふき、キャップをきちんと閉めてください。</li>\\r\\n\\t                                <li>直射日光のあたるところや高温多湿のところには置かないでください。</li>\\r\\n\\t                  