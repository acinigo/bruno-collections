ラをきれいに拭き、キャップをきちんと閉めてください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN アイセレブレーションマスク</li>\\r\\n                                    <li>マスクのクリームが目に入らないようご注意ください。目に入った場合は、すぐに水かぬるま湯で洗い流してください。</li>\\r\\n                                    <li>洗い流したあとも目に異物感が残る場合は眼科専門医等へご相談ください。</li>\\r\\n                                    <li>袋から取り出したマスクはすぐにお使い下さい。</li>\\r\\n                                    <li>シートはラップフィルムと不織布の2層構造です。シート表面を強く引きすぎるとフィルムが剥がれたり、破れることがありますのでご注意ください。</li>\\r\\n                                    <li>マスクをのせたまま、おやすみにならないでください。</li>\\r\\n                                    <li>マスクをはがした後、強くこするとまれに保湿成分がポロポロとした小さな固まりになって出る場合があります。</li>\\r\\n                                    <li>一度使用したマスクは、お使いにならないでください。</li>\\r\\n                                    <li>なるべく水平な状態において保管してください。</li>\\r\\n                                    <li>乳幼児の手の届かないところに置いてください。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\\r\\n\\r\\n<style>@media(max-width: 768px) { .pdp-page .z-overview-info-tabs #overview {margin-bottom:0;}}</style>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwe1c3581a/products-02/18028/18028_S_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwa4d29265/products-02/18028/18028_S_02.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwd30927b5/produ