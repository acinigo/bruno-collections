                                <li class=\\\"z-komidashi\\\">アルティミューン&trade; パワライジング コンセントレート Ⅲ</li>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>火気にご注意ください。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwdc8ab370/products-02/19565/19565_J_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwe67b347d/products-02/19565/19565_J_02.jpg\"],\"price\":{\"currency\":\"Japanese Yen\",\"value\":5500},\"brand\":\"SHISEIDO メーキャップ\",\"addToBagUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Cart-AddProduct?pid=4514254133439\",\"prodUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/shiseido-150th-anniversary-limited-makeup-kit-4514254133439.html?lang=jp\",\"averageStars\":null,\"information\":{\"category\":\"スキンケア\",\"subcategory\":\"アイテム\",\"subsubcategory\":\"セット品\",\"size\":\"\",\"color\":\"\",\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"NOT_AVAILABLE\",\"isOrderable\":false}}},{\"code\":\"4514254106044\",\"tags\":[],\"ja\":{\"name\":\"アーバン トリプル ビューティ サンケア エマルジョン\",\"shortDescription\":\"太陽を美の味方にする、SHISEIDOの新技術※搭載。逆転発想の日焼け止め、誕生。<br>※紫外線をカットしながら、スキンケアする光に変換する技術搭載。\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\">\\r\\n    <div class=\\\"row\\\" id=\\\"overview\\\">\\r\\n        <div class=\\\"z-content-wrap\\\">\\r\\n            <nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\">\\r\\n                <ul>\\r\\n                    <li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li>\\r\\n                    <li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li>\\r\\n                </ul>\\r\\n            </nav>\\r\\n            <div class=\\\"z-overview-content\\\"><a class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\" href=\\\"#z-tabcontent1\\\"><span>商品について</span></a>\\r\\n                <div class=\\\"pdp-content-section is-open\\\" id=\\\"z-tabcontent1\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-7 z-column\\\">\\r\\n                            <p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">世界初※のSun Dual Care&trade;テクノロジーが、強力な紫外線から肌を防御しながら、太陽の光をスキンケアする光へと変換。<br>ハリとうるおいに満ちた明るい肌へ。365日使用できる、新世代の日焼け止め用乳液です。ウォータープルーフ。</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\">※肌を守るUV防御剤および、UVを美容効果のある光に変換するスピルリナプラテンシスエキスと蛍光酸化亜鉛、その光を増幅させるPEG/PPG-14/7ジメチルエーテルを配合した処方。(2021年4月Mintel社データベース及び独自調査による当社調べ)</p>\\r\\n<!--＠コスメ--><p class=\\\"z-overview-content-anchor\\\"><a href=\\\"#atcosme_reviews\\\">クチコミを見る</a></p><!---->\\r\\n                        </div>\\r\\n                        <div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\">\\r\\n                            <div class=\\\"z-overview-box__full-ingredients\\\">\\r\\n                                <div class=\\\"keyingredients z-keyingredients\\\">\\r\\n                                    <dl>\\r\\n                                        <dt>原産地</dt>\\r\\n                                        <dd>：日本</dd>\\r\\n                                     </dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=4514254106044-full-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li>2層タイプなので、振って音がしてから、さらに5回振ってご使用ください。</li>\\r\\n                                    <li>手のひらに１円硬貨大を目安にとり、顔の５カ所（両ほお、額、鼻、あご）におき、ほおや額など広い部分からはじめ、顔の中心から外側に向かって顔のすみずみまでムラなくていねいになじませます。<br/>（ファンデーションを使用しない場合は、さらに１円硬貨大を目安に重ねづけしてください。）</li>\\r\\n                                    <li>首につけるときは、１０円硬貨大を目安にとり、下から上に向かってなじませ、耳・えり足部分も忘れずにつけてください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">落とすときは、メイク落としをご使用ください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">使用量が少ないと、十分な紫外線防御効果が得られない場合があります。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>目に入らないように注意し、入ったときはすぐに洗い流してください。</li>\\r\\n                                    <li>ご使用後は容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li>\\r\\n                                    <li>つけた後の肌が衣服や車のシートなどとこすれた場合、白く残ることがありますのでご注意ください。</li>\\r\\n                                    <li>衣服についた場合は、すぐに洗剤でていねいに洗ってください。ピンク色に変色する恐れがありますので塩素系漂白剤のご使用は避けてください。</li>\\r\\n                                    <li>色落ちしたり、痛める場合がありますので、家具、小物、ネイル、革製品などにつかないよう十分ご注意ください。</li>\\r\\n                                    <li>乳幼児の手の届かないところに置いてください。</li>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>火気にご注意ください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">商品のSPF表示及びPA表示は、国際SPF試験法に定められている塗布量1c㎡あたり2mgを皮ふに塗布して測定した結果です。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\\r\\n<style>\\r\\n/* 22SS margin size */\\r\\n@media (min-width: 769px) {\\r\\n/*section .pdp-content-inner .z-pdp-common__wrapper:not(:first-of-type),\\r\\nsection .pdp-content-inner .z-pdp-common__wrapper:first-of-type{margin-top:96px;}*/\\r\\n.z-pdp-common__type_image, .z-pdp-common__wrapper_inner{width:1135px;}\\r\\n}\\r\\n@media (max-width: 1440px) and (min-width: 769px) {\\r\\n    .z-pdp-common__type_image, .z-pdp-common__wrapper_inner{width:calc(1135 * 100vw / 1440);}\\r\\n}\\r\\n@media (max-width: 768px) {\\r\\n/*section .pdp-content-inner .z-pdp-common__wrapper:not(:first-of-type),\\r\\nsection .pdp-content-inner .z-pdp-common__wrapper:first-of-type {margin-top:64px;}*/\\r\\n.z-pdp-common__player>div{width: calc(840 * 100vw / 960); height: calc((840 * 100vw / 960) * 0.5625);}\\r\\n}\\r\\n\\r\\n@media(max-width: 768px) { .pdp-