nts\\\"><div class=\\\"keyingredients z-keyingredients\\\"><dl><dt>香り</dt><dd>： フローラルグリーンをベースとした香り</dd><dt>原産地</dt><dd>： 日本</dd></dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/4514254031261-full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><!--/#z-tabcontent1--><a href=\\\"#z-tabcontent2\\\" class=\\\"z-accordion-toggle z-show-for-small-only \\\"><span>使用方法</span></a><div id=\\\"z-tabcontent2\\\" class=\\\"pdp-content-section \\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><!--<div class=\\\"adjust-row_desktop venue uni\\\">--><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>洗顔と化粧水のあとにお使いください。</li><li>添付のスパチュラで、適量のジェルを手のひらに取り出します。</li><li>目の中に入れないように注意し、指先で顔全体にのばします。</li><li>肌の上を2、3分やさしくマッサージします。</li><li>約3分間、肌の上にのせマスクをします。その後、ティッシュでふき取ります。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>お肌に傷やはれもの・湿しん・色抜け（白斑等）や黒ずみなどの異常が生じていないかよく注意して使用してください。お肌に合わないときは、使用を中止し、皮ふ科医などにご相談ください。</li><li>ご使用後は容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li><li>直射日光または高温は避けて保管ください。</li><li>目に入らないようご注意ください。もし入った場合は、こすらずに、すぐ洗い流してください。目に異物感がある場合は、眼科医にご相談ください。</ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwdab8f2fe/products/11923/11923_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sit