                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>使い始めは中味が出るまでディスペンサーをゆっくりと奥まで数回押してください。</li>\\r\\n                                    <li>ご使用後は、容器の口もとをきれいにふき、キャップをきちんとしめてください。</li>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>幼児の手の届かないところに置いてください。</li>\\r\\n                                    <li>火気にご注意ください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レフィルについて</li>\\r\\n                                    <li>ディスペンサーは洗わずに、そのままセットしてください。</li>\\r\\n                                    <li>ディスペンサーを開閉するとき、誤って上の部分を回すと、ディスペンサーが使えなくなります。</li>\\r\\n                                    <li>前の容器に残った中味は、レフィル容器に移し替えないでください。</li>\\r\\n                                    <li>アルティミューン  パワライジング  コンセントレート  Ⅲの50mLサイズ以外のディスペンサーはご使用になれません。</li>\\r\\n                                    <li>清潔にご使用いただくため2～3回付け替えた後、新しい本体容器にお取替えいただくことをおすすめします。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n\\r\\n<wainclude url=\\\"/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Include?cid=PDP_22AW_UTM_BNR_eeutm-kit\\\">\\r\\n<wainclude url=\\\"/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Include?cid=PDP_22AW_BNR_dokidoki-special\\\">\\r\\n\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\\r\\n<style>\\r\\n    .z-overview-content-anchor {\\r\\n        margin-top: 18px;\\r\\n    }\\r\\n    .z-overview-content-anchor a {\\r\\n        color: inherit;