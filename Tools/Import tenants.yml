\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"NOT_AVAILABLE\",\"isOrderable\":false}}},{\"code\":\"4514254992173\",\"tags\":[],\"ja\":{\"name\":\"クリア サンケア スティック\",\"shortDescription\":\"強力な紫外線からもしっかり守るスティック状日焼け止め。\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\">\\r\\n    <div class=\\\"row\\\" id=\\\"overview\\\">\\r\\n        <div class=\\\"z-content-wrap\\\">\\r\\n            <nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\">\\r\\n                <ul>\\r\\n                    <li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li>\\r\\n                    <li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li>\\r\\n                </ul>\\r\\n            </nav>\\r\\n            <div class=\\\"z-overview-content\\\"><a class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\" href=\\\"#z-tabcontent1\\\"><span>商品について</span></a>\\r\\n                <div class=\\\"pdp-content-section is-open\\\" id=\\\"z-tabcontent1\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-7 z-column\\\">\\r\\n                            <p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">独自のシンクロシールド&trade;※を搭載し、太陽の熱や汗・水で防御膜を強化し、強い紫外線からも肌をしっかりプロテクト。<br>いつでも手を汚さずに直接塗れて、メイクの上からも、塗り直しにも便利です。パッケージ(袋)に資生堂で初めて生分解性素材を採用。<br>海を中心に、環境と肌のどちらも守る取り組みを進めています。</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\">※ウェットフォーステクノロジー・ヒートフォーステクノロジー</p>\\r\\n                            <p class=\\\"z-overview-content-anchor\\\">\\r\\n                                <a href=\\\"#atcosme_reviews\\\">クチコミを見る</a>\\r\\n                            </p>\\r\\n                        </div>\\r\\n                        <div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\">\\r\\n                            <div class=\\\"z-overview-box__full-ingredients\\\">\\r\\n                                <div class=\\\"keyingredients z-keyingredients\\\">\\r\\n                                    <dl>\\r\\n                                        <dt>原産地</dt>\\r\\n                                        <dd>：日本</dd>\\r\\n                                     </dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=4514254992173-full-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li>スティックを容器から1cmほど繰り出し、肌に直接フィットさせ、塗りムラのないようにたっぷりと塗布してください。</li>\\r\\n                                    <li>目の際や鼻の周辺などスティックがフィットしにくい部分は、指でスティックをなでるようにして取り、なじませてください。</li>\\r\\n                                    <li>お手持ちの洗顔料でスムーズに落とせます。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>使用量が少ないと、十分な紫外線防御効果が得られません。</li>\\r\\n                                    <li>泳いだりタオルで拭いた後などは、必要に応じて塗りなおしてください。</li>\\r\\n                                    <li>スティックを繰り出しすぎると、折れたり戻らなくなることがありますのでご注意ください。</li>\\r\\n                                    <li>温度変化によって表面がぬれて見えることがありますが、品質上問題はありませんので、ふき取ってお使いください。</li>\\r\\n                                    <li>衣服についた場合は、すぐに洗剤でていねいに洗ってください。ピンク色に変色するおそれがありますので塩素系漂白剤のご使用はさけてください。</li>\\r\\n                                    <li>中味が容器まわりに付着していますと、滑りやすいのでご注意ください。</li>\\r\\n                                    <li>ご使用後はキャップをきちんとしめてください。</li>\\r\\n                                    <li>乳幼児の手の届かないところに置いてください。</li>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>目に入らないようご注意ください。もし入った場合はすぐに水かぬるま湯で洗い流してください。</li>\\r\\n                                    <li class=\\\"z-kome-2\\\">商品のSPF表示及びPA表示は、国際SPF試験法に定められている塗布量1ｃ㎡あたり2mgを皮ふに塗布して測定した結果です。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">このプロテクターはSHISEIDOのウォータープルーフではない製品と比較し、海へ入った際に溶出が少ない設計であることが確認されています。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">袋は96％生分解性素材で作られています。素材の特性上、ご使用環境によっては劣化が早まり、破れ等の変化が起こりやすくなりますが、商品の容器、中味は問題なくご使用頂けます。捨てる際は通常のプラスチックごみと一緒に捨ててください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">袋は、外出時などに簡易ポーチとしてリユース頂けます。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\\r\\n\\r\\n<style>@media(max-width: 768px) { .pdp-page .z-overview-info-tabs #overview {margin-bottom:0;}}</style>\\r\\n\\r\\n<style>\\r\\n    .z-overview-content-anchor {\\r\\n        margin-top: 18px;\\r\\n    