\":\"\",\"subcategory\":\"\",\"subsubcategory\":\"\",\"size\":\"81g\",\"color\":\"\",\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"NOT_AVAILABLE\",\"isOrderable\":false}}},{\"code\":\"4514254087916\",\"tags\":[],\"ja\":{\"name\":\"ピューリファイング ピールオフ マスク\",\"shortDescription\":\"赤しそエキスGL※配合。<br />毛穴の奥まで、さっぱり爽快ピールオフマスク<br /><small>※ 保湿成分（シソ葉エキス、グリセリン）</small>\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\"><div id=\\\"overview\\\" class=\\\"row\\\"><div class=\\\"z-content-wrap\\\"><nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\"><ul><li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li><li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li></ul></nav><div class=\\\"z-overview-content\\\"><a href=\\\"#z-tabcontent1\\\" class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\"><span>商品について</span></a><div id=\\\"z-tabcontent1\\\" class=\\\"pdp-content-section is-open\\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-7 z-column\\\"><p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">大気中のちりやほこり、皮脂汚れなどによるべたつきやくすみ、ざらつきが気になる肌に。赤しそエキスGL※配合の色鮮やかなペーストが、毛穴汚れや古い角層を一掃するピールオフマスク。マスクを取り去る爽快感とともに、生まれたてのような明るくなめらかな肌へ導きます。</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\">※保湿成分（シソ葉エキス、グリセリン）</p></div><div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\"><div class=\\\"z-overview-box__full-ingredients\\\"><div class=\\\"keyingredients z-keyingredients\\\"><dl><dt>原産地</dt><dd>： 日本</dd></dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/4514254087916-full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><!--/#z-tabcontent1--><a href=\\\"#z-tabcontent2\\\" class=\\\"z-accordion-toggle z-s