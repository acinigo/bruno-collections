mer Recycled(ポスト コンシューマーリサイクルド)の略語で、市場回収された素材を再利用することです。</p>\\r\\n                            <p class=\\\"z-overview-content-anchor\\\">\\r\\n                                <a href=\\\"#atcosme_reviews\\\">クチコミを見る</a>\\r\\n                            </p>\\r\\n                        </div>\\r\\n                        <div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\">\\r\\n                            <div class=\\\"z-overview-box__full-ingredients\\\">\\r\\n                                <div class=\\\"keyingredients z-keyingredients\\\">\\r\\n                                    <dl>\\r\\n                                        <dt>香り</dt>\\r\\n                                        <dd>：グリーンフローラルの香り</dd>\\r\\n                                        <dt>原産地</dt>\\r\\n                                        <dd>：日本</dd>\\r\\n                                        <dt>使用期間</dt>\\r\\n                                        <dd>：30mL 約1カ月<br>50mL 約2カ月</dd>\\r\\n                                     </dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=F646-full-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li>毎日の朝、夜のお手入れに、化粧水で肌を整えてから、乳液またはクリームの前にお使いください。</li>\\r\\n                                    <li>他の美容液と併用される場合は、アルティミューン パワライジング コンセントレート Ⅲを先にお使いください。</li>\\r\\n                                    <li>ディスペンサー2回押し分を手にとり、顔全体にていねいに均一になじませます。 </li>\\r\\n                                    <li class=\\\"z-kome-1\\\">アルティミューン パワライジング コンセントレート Ⅲの50mLサイズ以外のディスペンサーはご使用になれません。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レフィル容器へのディスペンサーのセット方法</li>\\r\\n                                    <li class=\\\"z-non-dot\\\">1. レフィル容器のキャップをはずし捨ててください。</li>\\r\\n                                    <li class=\\\"z-non-dot\\\">2. 使い終わった本体容器を片方の手で押さえながら、ディスペンサーの下の部分をもち、回してはずしてください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">ディスペンサーをはずしたとき、本体容器の口もとにリング状の白いパッキンが残ることがあります。白いパッキンは捨てずに新しいレフィル容器の口もとにのせてください。</li>\\r\\n                                    <li class=\\\"z-non-dot\\\">3. はずしたディスペンサーをレフィル容器にセットして、しっかりしめてください。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>使い始めは中味が出るまでディスペンサーをゆっくりと奥まで数回押してください。</li>\\r\\n                                    <li>ご使用後は、容器の口もとをきれいにふき、キャップをきちんとしめてください。</li>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>幼児の手の届かないところに置いてください。</li>\\r\\n                                    <li>火気にご注意ください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レフィルについて</li>\\r\\n                                    <li>ディスペンサーは洗わずに、そのままセットしてください。</li>\\r\\n                                    <li>ディスペンサーを開閉するとき、誤って上の部分を回すと、ディスペンサーが使えなくなります。</li>\\r\\n                                    <li>前の容器に残った中味は、レフィル容器に移し替えないでください。</li>\\r\\n                            