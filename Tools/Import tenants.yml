いて</a></li><li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li></ul></nav><div class=\\\"z-overview-content\\\"><a href=\\\"#z-tabcontent1\\\" class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\"><span>商品について</span></a><div id=\\\"z-tabcontent1\\\" class=\\\"pdp-content-section is-open\\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-7 z-column\\\"><p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">デリケートな目もと口もとの肌に。しなやかに整えるクリーム。<br />明るく華やぎのある表情へ。こくのあるクリームが肌にフィットして、ピンとハリのある状態に整えます。乾燥による小じわを目立たなくします。※<br />独自のマッサージとエクササイズによって、よりいきいきとした肌を保ちます。</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\">※効能試験済み</p></div><div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\"><div class=\\\"z-overview-box__full-ingredients\\\"><div class=\\\"keyingredients z-keyingredients\\\"><dl><dt>香り</dt><dd>： ホワイトフローラルの洗練された香り</dd><dt>原産地</dt><dd>： 日本</dd><dt>使用期間</dt><dd>： 約1カ月<br class=\\\"z-nobr-sp\\\" />（使用方法にそった使い方での目安）</dd></dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/4514254095539-full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><!--/#z-tabcontent1--><a href=\\\"#z-tabcontent2\\\" class=\\\"z-accordion-toggle z-show-for-small-only \\\"><span>使用方法</span></a><div id=\\\"z-tabcontent2\\\" class=\\\"pdp-content-section \\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><!--<div class=\\\"adjust-row_desktop venue uni\\\">--><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>朝と夜に使用します。</li><li>朝は、乳液（日中用）または、クリーム（日中用）の前に使います。</li><li class=\\\"z-kome-1\\\">紫外線防御効果のある化粧品の前に使用します。</li><li>夜は顔全体のお手入れの後に、添付のスパチュラで指先に小さなパール粒1コ分を目安にとり、目のまわり、口のまわりに広げます。</li><li>その後、より高い効果を引き出すために、マッサージⅠ・Ⅱと、目もとのエクササイズⅢを行います。</li><li class=\\\"z-komidashi\\\">Ⅰ. 目もとのマッサージ</li><li>眉頭の下のくぼみを押した後、目のまわりを囲むようにすべらせます。（6回）</li><li>最後にこめかみを押します。</li><li>目の下・まぶたを目頭からこめかみに向かって引き上げます。（6回）</li><li class=\\\"z-komidashi\\\">Ⅱ. 口もとのマッサージ</li><li>上唇のシワをのばすように外側に引き、下唇は口角を引き上げます。（6回）</li><li>ほうれい線のシワをのばすように、斜めに引き上げます。（6回）</li><li class=\\\"z-komidashi\\\">Ⅲ. 目もとのエクササイズ<li class=\\\"z-non-dot\\\">1. 目を大きく開け、そのまま5秒静止します。</li><li class=\\\"z-non-dot\\\">2. ゆっくりと薄目の状態になり、そのまま5秒静止します。</li><li class=\\\"z-kome-1\\\">1と2を交互に3回繰り返します。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>ご使用後はキャップをきちんと閉めてください。</li><li>日のあたるところや高温のところに置かないでください。</ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwcc8b71e8/products/13922/13922_S_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwc2453793/products/13922/13922_S_02.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw3158070b/products/13922/13922_S_03.jpg\"],\"price\":{\"currency\":\"Japanese Yen\",\"value\":16500},\"brand\":\"SHISEIDO フューチャーソリューション LX\",\"addToBagUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Cart-AddProduct?pid=4514254095539\",\"prodUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/future-solution-lx-eye-and-lip-contour-r-cream-e