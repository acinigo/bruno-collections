w-box__full-description__howtouse\\\">使用方法</p><ul><li>スキンケアや化粧下地で肌を整えたあと、乾いたスポンジか水で軽く湿らせたスポンジに適量をとり、顔の中心から外側に向けてのばします。</li><li>水で湿らせたスポンジは、十分に水気をきってからケースにしまってください。</li><li class=\\\"z-komidashi\\\">ケースへのセット方法</li><li>透明ケースからファンデーションの中皿を取り出し、ケースの左側に中皿をななめに差し込み、中皿の右側部分をカチッと音がするまで上から押してください。</li><li>ケースから中皿を取り出すときは、中皿の右側部分のふちに指のはらをあて、反対側に軽く押しながら上へ取り出します。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>お肌に傷やはれもの・湿しん・色抜け（白斑等）や黒ずみなどの異常が生じていないかよく注意して使用してください。お肌に合わないときは、使用を中止し、皮ふ科医などにご相談ください。</li><li>商品に表示されているSPF値は、国際的に定められている標準塗布量に従い、1cm&sup2;あたり2mg塗布して測定した値です。使用量が少ないと、十分な紫外線防御効果が得られません。</li><li>紫外線防御効果のある化粧下地などとの併用をおすすめします。</li><li>スポンジがよごれると、ファンデーションがつきにくくなりますので、いつも清潔にしてお使いください。スポンジがよごれたときは、ぬるま湯に中性洗剤をうすくとかして軽く押し洗いをします。洗剤が残らないように十分にすすいだ後、水気をきり、日かげでよく乾かしてからお使いください。</li><li>パウダーファンデーションは、落下などの衝撃により割れることがありますので、ご注意ください。</li><li>日のあたるところや高温・多湿のところに置かないでください。</ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"master\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw8e1f6538/products/13173/13173_01.jpg\"],\"price\":{\"currency\":\"Japanese Yen\",\"value\":4950},\"brand\":\"\",\"addToBagUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Cart-AddProduct?pid=694701\",\"prodUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/vital-perfection-powder-foundation-refill-694701.html?lang=jp\",\"averageStars\":null,\"information\":{\"category\":\"\",\"subcategory\":\"\",\"subsubcategory\":\"\",\"size\":\"\",\"color\":\"オークル