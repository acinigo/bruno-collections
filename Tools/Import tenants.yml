full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><!--/#z-tabcontent1--><a href=\\\"#z-tabcontent2\\\" class=\\\"z-accordion-toggle z-show-for-small-only \\\"><span>使用方法</span></a><div id=\\\"z-tabcontent2\\\" class=\\\"pdp-content-section \\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><!--<div class=\\\"adjust-row_desktop venue uni\\\">--><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>お手入れの最後に適量を手のひらにとり、ていねいになじませます。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>ご使用後は容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li><li>衣服についた場合は、すぐに洗剤でていねいに洗ってください。ピンク色に変色する恐れがありますので塩素系漂白剤のご使用はさけてください。</li><li>火気にご注意ください。</li><li>乳幼児の手の届かないところに置いてください。</li><li>日のあたるところや高温のところに置かないでください。</li><li class=\\\"z-komidashi\\\">強い紫外線下では以下の注意事項を守りましょう</li><li>日にあたる前に、均一に塗布してください。</li><li>紫外線防御効果を維持するために、汗をかいたり、タオルで拭いた後などは、必要に応じて重ね付けしてください。</li><li>使用量が少ないと、十分な紫外線防御効果が得られません。</li><li>日光にあたりすぎると、健康に深刻な影響を与えます。</li><li>日中の一番暑い時間帯は、日陰で過ごしましょう。</li><li>肌を守る衣服やつばの広い帽子を身につけ、サングラスをかけましょう。</li><li class=\\\"z-kome-2\\\">商品のSPF表示及びPA表示は、国際SPF試験法に定められている塗布量1cm&sup2;あたり2mgを皮ふに塗布して測定した結果です。</ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwe63add44/products/11558/11558_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw7d