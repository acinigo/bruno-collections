先進テクノロジーの融合で生まれた美容液が、乾燥などのダメージが深く重なった肌にアプローチ。さらに、厳選された5種の植物由来成分配合の目もと用アイマスクが、効果的に肌にフィットし、一度でみずみずしく輝く目もとへ。2つを組み合わせた慈しむお手入れで、未来の美しさへ導きます。<br><br>\\r\\n［セット内容］<br>・フューチャーソリューション LX レジェンダリーEN ルミナンス セラム＜美容液＞ 30mL<br>・フューチャーソリューション LX レジェンダリーEN アイ セレブレーション マスク＜目もと用マスク＞  5g×3</p>\\r\\n                        </div>\\r\\n                        <div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\">\\r\\n                            <div class=\\\"z-overview-box__full-ingredients\\\">\\r\\n                                <div class=\\\"keyingredients z-keyingredients\\\">\\r\\n                                    <dl>\\r\\n                                        <dt>原産地</dt>\\r\\n                                        <dd>：日本</dd>\\r\\n                                     </dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=4514254102510-full-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN ルミナンス セラム</li>\\r\\n                                    <li>朝と夜、洗顔後保湿液または化粧水で肌を整えた後、手のひらにディスペンサー1回押し分をとり、顔全体にていねいになじませます。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN アイセレブレーションマスク</li>\\r\\n                                    <li>マスクはたたまれた状態で入っています。</li>\\r\\n                                    <li>マスクはラップフィルムと不織布の2層構造です。マスク表面を強く引っぱるとラップフィルムがはがれたり、破れることがありますのでご注意ください。</li>\\r\\n                                    <li>夜のお手入れの最後にお使いください。</li>\\r\\n                                    <li>マスクを袋から取り出し、丁寧に広げ、目の位置に合わせて肌に貼ります。</li>\\r\\n                                    <li>マスクの縁に沿って目のまわりを圧迫するように押しながらフィットさせます。</li>\\r\\n                                    <li>約10分後にマスクをはがし、肌に残ったクリームをやさしくなじませます。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN ルミナンス セラム</li>\\r\\n                                    <li>使い始めは、中味が出るまでディスペンサーを数回押してください。</li>\\r\\n                                    <li>ご使用後は容器の口もとをきれいに拭き、必ずカバーキャップをきちんと閉めてください。</li>\\r\\n                                    <li>中味衛生上、使用期間中はディスペンサーを容器から取り外さないでください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN アイセレブレーションマスク</li>\\r\\n                                    <li>マスクのクリームが目に入らないようご注意ください。目に入った場合は、すぐに水かぬるま湯で洗い流してください。</li>\\r\\n                                    <li>洗い流したあとも目に異物感が残る場合は眼科専門医等へご相談ください。</li>\\r\\n                                    <li>袋から取り出したマスクはすぐにお使い下さい。</li>\\r\\n                                    <li>シートはラップフィルムと不織布の2層構造です。シート表面を強く引きすぎるとフィルムが剥がれたり、破れることがありますのでご注意ください。</li>\\r\\n                                    <li>マスクをのせたまま、おやすみにならないでください。</li>\\r\\n                                    <li>マスクをはがした後、強くこするとまれに保湿成分がポロポロとした小さな固まりになって出る場合があります。</li>\\r\\n                                    <li>一度使用したマスクは、お使いにならないでください。</li>\\r\\n            