ューチャーソリューション LX\",\"addToBagUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Cart-AddProduct?pid=4514254998595\",\"prodUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/future-solution-lx-total-r-cushion-e-puff-4514254998595.html?lang=jp\",\"averageStars\":null,\"information\":{\"category\":\"プレミアムシリーズ\",\"subcategory\":\"アイテム\",\"subsubcategory\":\"化粧用具\",\"size\":\"\",\"color\":\"\",\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"IN_STOCK\",\"isOrderable\":true}}},{\"code\":\"4514254102527\",\"tags\":[],\"ja\":{\"name\":\"レジェンダリーEN クリーム セット\",\"shortDescription\":\"凛とした顔立ち印象へ導く高機能クリームと目もと用特製マスクをセットに。ワンランク上の美しさを実現したいあなたのためのラグジュアリーケアセット、誕生。\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\">\\r\\n    <div class=\\\"row\\\" id=\\\"overview\\\">\\r\\n        <div class=\\\"z-content-wrap\\\">\\r\\n            <nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\">\\r\\n                <ul>\\r\\n                    <li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li>\\r\\n                    <li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li>\\r\\n                </ul>\\r\\n            </nav>\\r\\n            <div class=\\\"z-overview-content\\\"><a class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\" href=\\\"#z-tabcontent1\\\"><span>商品について</span></a>\\r\\n                <div class=\\\"pdp-content-section is-open\\\" id=\\\"z-tabcontent1\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-7 z-column\\\">\\r\\n                            <p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">日本古来の豊かな自然に育まれた植物の力とSHISEIDOの先進テクノロジーが融合。濃密で贅沢なクリームがフェイスラインまでフィットし、明るい光を纏ったようなハリのある肌へ導きます。さらに、厳選された5種の植物由来成分配合の目もと用アイマスクが、効果的に肌にフィットし、一度でみずみずしく輝く目もとへ。2つを組み合わせた慈しむお手入れで、未来の美しさへ導きます。<br><br>\\r\\n［セット内容］<br>・フューチャーソリューション LX レジェンダリーEN クリーム 50g<br>・フューチャーソリューション LX レジェンダリーEN アイ セレブレーション マスク＜目もと用マスク＞ 5g×3 </p>\\r\\n                        </div>\\r\\n                        <div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\">\\r\\n                            <div class=\\\"z-overview-box__full-ingredients\\\">\\r\\n                                <div class=\\\"keyingredients z-keyingredients\\\">\\r\\n                                    <dl>\\r\\n                                        <dt>原産地</dt>\\r\\n                                        <dd>：日本</dd>\\r\\n                                     </dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=4514254102527-full-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN クリーム</li>\\r\\n                                    <li>保湿液または美容液の後、添付のスパチュラで指先にパール粒2コ分を目安にとり、顔全体になじませます。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN アイセレブレーションマスク</li>\\r\\n                                    <li>マスクはたたまれた状態で入っています。</li>\\r\\n                                    <li>マスクはラップフィルムと不織布の2層構造です。マスク表面を強く引っぱるとラップフィルムがはがれたり、破れることがありますのでご注意ください。</li>\\r\\n                                    <li>夜のお手入れの最後にお使いください。</li>\\r\\n                                    <li>マスクを袋から取り出し、丁寧に広げ、目の位置に合わせて肌に貼ります。</li>\\r\\n                                    <li>マスクの縁に沿って目のまわりを圧迫するように押しながらフィットさせます。</li>\\r\\n                                    <li>約10分後にマスクをはがし、肌に残ったクリームをやさしくなじませます。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN クリーム</li>\\r\\n                                    <li>ご使用後は容器の口元とスパチュラをきれいに拭き、キャップをきちんと閉めてください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">レジェンダリーEN アイセレブレーションマスク</li>\\r\\n                                    <li>マスクのクリームが目に入らないようご注意ください。目に入った場合は、すぐに水かぬるま湯で洗い流してください。</li>\\r\\n                                    <li>洗い流したあとも目に異物感が残る場合は眼科専門医等へご相談ください。</li>\\r\\n                                    <li>袋から取り出したマスクはすぐにお使い下さい。</li>\\r\\n                                    <li>シートはラップフィルムと不織布の2層構造です。シート表面を強く引きすぎるとフィルムが剥がれたり、破れることがありますのでご注意ください。</li>\\r\\n                                    <li>マスクをのせたまま、おやすみにならないでください。</li>\\r\\n                                    <li>マスクをはがした後、強くこするとまれに保湿成分がポロポロとした小さな固まりになって出る場合があります。</li>\\r\\n                                    <li>一度使用したマスクは、お使いにならないでください。</li>\\r\\n                                    <li>なるべく水平な状態において保管してください。</li>\\r\\n                                    <li>乳幼児の手の届かないところに置いてください。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n    