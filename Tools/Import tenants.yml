emandware.net/s/shiseido_global_jp/shiseido-clear-suncare-stick-4514254992173.html?lang=jp\",\"averageStars\":null,\"information\":{\"category\":\"その他商品\",\"subcategory\":\"サンケア\",\"subsubcategory\":\"日焼け止め\",\"size\":\"20g\",\"color\":\"\",\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"IN_STOCK\",\"isOrderable\":true}}},{\"code\":\"4514254981375\",\"tags\":[],\"ja\":{\"name\":\"パワライジング セット\",\"shortDescription\":\"力強い明日のために。未来を守る美容液を継続して使えるセット。\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\"><div class=\\\"row\\\" id=\\\"overview\\\"><div class=\\\"z-content-wrap\\\"><nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\"><ul><li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li><li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li></ul></nav><div class=\\\"z-overview-content\\\"><a class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\" href=\\\"#z-tabcontent1\\\"><span>商品について</span></a><div class=\\\"pdp-content-section is-open\\\" id=\\\"z-tabcontent1\\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-7 z-column\\\"><p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">未来のエイジングダメージを恐れない。ゆるぎない美しさを目指す美容液アルティミューン。続けて使ってうるおいのある健やかな美をキープするのに最適な50mL本体とレフィルの特別な限定セットが登場。使うたびに乾燥などの外的悪影響から肌を守り、なめらかさ、ハリ、明るさのある肌へ導きます。</p></div><div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\"><div class=\\\"z-overview-box__full-ingredients\\\"><div class=\\\"keyingredients z-keyingredients\\\"><dl><dt>香り</dt><dd>： グリーンフローラルの香り</dd><dt>原産地</dt><dd>： 日本</dd></dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/4514254981375-full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a><div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>毎日の朝、夜のお手入れに、化粧水で肌を整えてから、乳液またはクリームの前にお使いください。</li><li>他の美容液と併用される場合は、アルティミューン パワライジングコンセントレート Nを先にお使いください。</li><li>ディスペンサー2回押し分を手にとり、顔全体にていねいに均一になじませます。レフィルは、必ずパワライジング コンセントレート N 50mLのディスペンサーをセットしてご使用ください。</li><li class=\\\"z-komidashi\\\">レフィル容器へのディスペンサーのセット方法</li><li class=\\\"z-non-dot\\\">1. レフィル容器のキャップをはずします。</li><li class=\\\"z-non-dot\\\">2. 使い終わった本体容器を片方の手で押さえながら、ディスペンサーの下の部分をもち、回してはずしてください。</li><li class=\\\"z-non-dot\\\">3. はずしたディスペンサーをレフィル容器にセットしてしっかり閉めてください。</li><li class=\\\"z-non-dot\\\">4. レフィル容器のキャップは捨ててください。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>使い始めは中味が出るまでディスペンサーをゆっくりと奥まで数回押してください。</li><li>ご使用後は、容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li><li>のあたるところや高温のところに置かないでください。</li><li>日のあたるところや高温のところに置かないでください。</li><li>ディスペンサーは洗わずに、そのままセットしてください。</li><li>前の容器に残った中味は、レフィル容器に移し替えないでください。</li><li>アルティミューン パワライジング コンセントレート Ｎの50mLサイズ以外のディスペンサーはご使用になれません。</li><li>清潔にご使用いただくため2～3回付け替えた後、新しい本体をお求めください。</li></ul></div></div></div></div></div></div></div></div><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"standard\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw13ce6a0d/products/16641/16641_01.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwf3820743/products/16641/16641_02.jpg\",\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Si