50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50}]},{\"name\":\"radiance\",\"type\":\"Double\",\"position\":{\"type\":\"column\",\"index\":2},\"positionType\":\"DoubleRange\",\"headers\":[{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50}]},{\"name\":\"smoothness\",\"type\":\"Double\",\"position\":{\"type\":\"column\",\"index\":3},\"positionType\":\"DoubleRange\",\"headers\":[{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50}]},{\"name\":\"resilience\",\"type\":\"Double\",\"position\":{\"type\":\"column\",\"index\":4},\"positionType\":\"DoubleRange\",\"headers\":[{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"lessThan\",\"value\":50},{\"type\":\"greaterEqual\",\"value\":50},{\"type\":\"lessThan\",\"value\":50}]}],\"rowParams\":[{\"name\":\"locale\",\"type\":\"String\",\"position\":{\"type\":\"row\",\"index\":1},\"positionType\":\"String\",\"headers\":[{\"type\":\"equal\",\"value\":\"ja\"},{\"type\":\"equal\",\"value\":\"en\"}]}],\"matrix\":[[\"肌トラブルがなくとてもよい状態です。肌の状態は季節や体調の変化で影響されるのでその時の肌状態に合わせたスキンケアを選んで美しい肌を維持するお手入れで現在の美しい肌をキープしましょう\",\"The skin is in a very good condition with no skin problems. Skin condition is affected by seasonal and physical changes, so choose a skincare regimen that suits your skin condition at the time and maintain your current beautiful skin with care that keeps your skin beautiful!\"],[\"全体的にはとてもよい状態ですが、透明感あふれる輝きのスコアに影響がでています。紫外線から肌を守り、美のめぐりを意識した適切なスキンケア商品でをお手入れをし、上質な肌をキープしましょう\",\"Overall, the skin is in very good condition, but the Radiance score is being affected. to increase the Radiance score, protect the skin from UV rays, increase beauty circulation, and use appropriate skin care products to maintain high quality skin.\"],[\"全体的にはよい状態ですが、なめらかさのスコアに影響がでています。スコアを高めるために保湿効果の高い適切なスキンケア商品でのお手入れをし、上質な肌をキープしましょう\",\"Overall, the skin is in good condition, but Smoothness score is affected, so to improve Smoothness score, use appropriate skin care products with high moisturizing effect to keep the quality of skin.\"],[\"全体的にはよい状態ですが、ハリ・弾力のスコアに影響がでています。\\nモイスチャーレベルが不足していることがスコアに影響する場合もため、肌の状態に合わせた最適な商品で肌にうるおいを与え、生きいきとした印象の肌へ導くスキンケアで上質な肌をキープしましょう\",\"Overall, the skin is in good condition, but the Resilience score is affected, so revitalize the skin to increase the Resilience score.\\nLack of moisture levels can sometimes affect the score, so keep your skin looking good with skincare that revitalizes the skin and boosts moisture levels with the best products for your skin's condition.\"],[\"全体的にはよい状態ですが、なめらかさとハリ・弾力のスコアに影響がでています。今は肌表面に目立つトラブルがない場合でも、肌にうるおいを与え、生きいきとした印象の肌へ導くスキンケアで上質な肌をキープしましょう\",\"Overall, the skin is in good condition, but the Smoothness and Resilience scores are affected. Even if there are no noticeable problems on the surface of the skin now, keep your skin in good quality with skin care that enhances moisturizing and revitalizing effects!\"],[\"全体的にはよい状態ですが、透明感あふれる輝きとハリ・弾力のスコアに影響がでていてる場合は肌に透明感やうるおいを与え、生きいきとした印象の肌へ導くスキンケアで上質な肌をキープしましょう\",\"If the Radiance and Resilience scores are affected, however, it is important to maintain the quality of the skin by using skincare products that help to clarify and revitalize the skin.\"],[\"全体的にはよい状態ですが、透明感あふれる輝きとなめらかさのスコアに影響がでています。紫外線から肌を守り、美のめぐりを意識した、保湿効果の高いスキンケアがおすすめです。\",\"Overall the condition is good, but Radiance and Smoothness scores are affected; to increase Radiance scores, skin should be protected from UV rays and Beauty Circulation should be increased, and for Smoothness, moisturizing skin care is recommended.\"],[\"全体的にはよい状態ですが、肌表面には表れていないトラブルが潜んでいる可能性があります。紫外線から肌を守り、うるおいを与え、肌にうるおいを与え、生きいきとした印象の肌へ導くスキンケアがおすすめです\",\"Although the skin is in good condition overall, there may be latent problems that are not apparent on the surface of the skin. Skin care that protects the skin from UV rays, moisturizes, and has a revitalizing effect is recommended!\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、季節や環境で肌状態も変化します。その時の肌状態に合わせたスキンケアを選び美しい肌を持続させるためのお手入れを継続しましょう\",\"Your skin condition is good. Your skin is in good condition, with no particular skin problems, but the skin condition changes with the seasons and the environment. Choose a skincare regimen that suits your skin condition at the time and continue to care for your skin to maintain its beauty.\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、透明感あふれる輝きのスコアに影響がでています。ワンランク上の肌までもう少しです。紫外線から肌を守り肌の透明感を高めるスキンケアでのお手入れがおすすめです\",\"Your skin condition is good. You have no skin problems, but your Radiance score is affected. You are almost ready for a higher level of skin. We recommend that you take care of your skin with skincare that protects your skin from UV rays and improves the clarity of your skin.\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、なめらかさのスコアに影響がでています。保湿効果の高いスキンケアでワンランク上の肌を目指しましょう\",\"Your skin condition is good. You have no particular skin problems, but your Smoothness score is affected. Let's aim for a higher grade of skin with moisturizing skin care!\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、ハリ・弾力のスコアに影響がでています。ワンランク上の肌までもう少しです。ハリ・弾力を与えるケアを継続しましょう\",\"Your skin condition is good. You have no skin problems, but your Resilience score is affected. You are almost there, but your Resilience score has been affected. Continue skincare to improve elasticity and resilience!\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、なめらかさとハリ・弾力のスコアに影響がでています。ワンランク上の肌までもう少しです。うるおいやハリ・弾力を与えるスキンケアでのお手入れがおすすめです\",\"Your skin condition is good. You have no skin problems, but your Smoothness and Resilience scores are affected. You are almost there, but your Smoothness and Resilience scores are affected. We recommend that you take care of your skin with skincare that improves moisturizing, elasticity, and resilience.\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、透明感あふれる加賀滝とハリ・弾力のスコアに影響がでています。紫外線から肌を守り肌の透明感やハリ・弾力を与えるスキンケアでのお手入れがおすすめです\",\"Your skin condition is good. You have no skin problems, but your Radiance and Resilience scores are affected. We recommend that you take care of your skin with skincare that protects your skin from UV rays and improves skin clarity, firmness, and elasticity.\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、透明感あふれる輝きとなめらかさのスコアに影響がでています。ワンランク上の肌まであと少しです。紫外線から肌を守り肌の透明感やうるおいを与えるスキンケアでのお手入れがおすすめです\",\"Your skin condition is good. You have no skin problems, but your Radiance and Smoothness scores are affected. You are close to achieving a higher level of skin. We recommend that you take care of your skin with skin care that protects your skin from UV rays and makes your skin clear and moisturized.\"],[\"あなたの肌状態は良好です。特に肌トラブルもない状態ですが、すべてのスコアに影響がでています。ワンランク上の肌までもう少しです。紫外線から肌を守り、美のめぐりを意識し、肌にうるおいを与え、生きいきとした印象の肌へ導くお手入れがおすすめです。\",\"Your skin condition is good. You have no skin problems, but all scores are affected. You are almost ready for a higher level of skin care. We recommend that you protect your skin from UV rays, increase beauty circulation, and care for your skin with skincare that moisturizes and revitalizes your skin.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。肌トラブルがでていない状態でも、美のめぐりを意識して適切なスキンケア商品でお手入れをし、季節や環境に影響を受けないようその時の肌状態に合わせたスキンケアでのお手入れがおすすめです\",\"Your overall skin score is slightly underperforming. Even if you are not experiencing skin problems, we recommend that you treat your skin with appropriate skin care products, such as those that enhance beauty circulation, and that you use skin care products that are appropriate for your skin's condition at the time so that it is not affected by the season or environment.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。透明感あふれる輝きのスコアを高めるために紫外線から肌を守り、美のめぐりを意識して、肌の透明感を高める適切なスキンケア商品でお手入れをしすることをおすすめします。\",\"Your overall skin score is somewhat poor, and we recommend that you treat your skin with appropriate skin care products that protect against UV rays, enhance beauty circulation, and improve skin clarity in order to increase your Radiance score.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。なめらかさのスコアを高めるために保湿効果の高い適切なスキンケア商品でのお手入れをおすすめします。\",\"Your overall skin score is somewhat poor, and we recommend that you treat your skin with appropriate moisturizing skin care products to improve your Smoothness score.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。ハリ・弾力のスコアを高めるために肌にうるおいやハリ・弾力を与えましょう。\\n時としてモイスチャーレベルが不足していることがスコアに影響するため、肌の状態に合わせた最適な商品で肌にうるおいやハリ・弾力を与える保湿力の高いスキンケアをおすすめします。\",\"Your overall skin score is slightly underperforming; revitalize your skin to increase your Resilience score.\\nAt times, lack of moisture levels can affect your score, so we recommend skin care to increase skin activation and moisture levels with the best products for your skin condition.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。なめらかさのスコアを高めるために保湿効果の高いスキンケア商品や、ハリ・弾力スコアを高めるために肌にうるおいを与え、賦活を与えましょう。時として保湿力の低下がスコアに影響するため、肌の状態に合わせた最適な商品で肌にうるおいを与え、生きいきとした印象の肌へ導くスキンケアをおすすめします。\",\"Your overall skin score is slightly underperforming, so we recommend highly moisturizing skin care products to increase your Smoothness score or revitalize your skin to increase your Resilience score. Since lack of moisture levels can sometimes affect your score, we recommend skin care products that are optimized for your skin's condition to increase skin activation and moisture levels.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。透明感あふれる輝きのスコアを高めるために紫外線から肌を守り、美のめぐりを意識した適切なスキンケア商品でのお手入れや、ハリ・弾力のスコアを高めるために肌にハリ・弾力を与えましょう\",\"Your overall skin score is slightly underperforming; care for your skin with appropriate skin care products such as UV protection and beauty circulation to increase your Radiance score, or revitalize your skin to increase your Resilience score.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。透明感あふれる輝きのスコアを高めるために紫外線から肌を守り、美のめぐりを意識したスキンケア商品でのお手入れや、なめらかさのスコアを高めるために保湿効果の高い適切なスキンケア商品でのお手入れをおすすめします。\",\"Your overall skin score is slightly underperforming, and we recommend caring for your skin with appropriate skin care products such as UV protection and beauty circulation to increase your Radiance score, and with appropriate skin care products that are moisturizing and effective to increase your Smoothness score. We recommend taking care of your skin.\"],[\"あなたの肌全体のスコアはやや低めで美のめぐりが均一ではないようです。すべてのスコアに影響がでています。美のめぐりを意識し、透明感あふれる輝きのスコアを高めるために紫外線から肌を守ることや、なめらかさのスコアに影響する保湿力の高いスキンケア。ハリ・弾力のスコアを高めるために、肌にうるおいを与え、生きいきとした印象の肌へ導くお手入れがおすすめです\",\"Your overall skin score is slightly underperforming. All scores are affected. We recommend protecting your skin from UV rays to increase Beauty Circulation and Radiance scores, Moisture Level, which affects Smoothness scores, and Revitalizing Care, which increases Resilience scores.\"]],\"returnParam\":{\"name\":\"RET\",\"type\":\"String\",\"script\":null}},{\"className\":\"RulesTable\",\"isMulti\":false,\"name\":\"GetBCExplanation\",\"type\":\"Double\",\"resultType\":null,\"params\":[{\"name\":\"BeautyCirculation\",\"type\":\"double\",\"position\":{\"type\":\"column\",\"index\":1},\"positionType\":\"DoubleRange\",\"headers\":[{\"type\":\"greaterThan\",\"value\":70},{\"type\":\"range\",\"typeLeft\":\"greaterEqual\",\"typeRight\":\"lessEqual\",\"valueLeft\":50,\"valueRight\":70},{\"type\":\"lessThan\",\"value\":50}]}],\"columnParams\":[{\"name\":\"BeautyCirculation\",\"type\":\"double\",\"position\":{\"type\":\"column\",\"index\":1},\"positionType\":\"DoubleRange\",\"headers\":[{\"type\":\"greaterThan\",\"value\":70},{\"type\":\"range\",\"typeLeft\":\"greaterEqual\",\"typeRight\":\"lessEqual\",\"valueLeft\":50,\"valueRight\":70},{\"type\":\"lessThan\",\"value\":50}]}],\"rowParams\":[],\"matrix\":[[\"Excellent\"],[\"Good\"],[\"Not is best\"]],\"returnParam\":{\"name\":\"RET\",\"type\":\"String\",\"script\":n