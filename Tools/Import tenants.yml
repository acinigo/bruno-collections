スペンサーの下の部分をもち、回してはずしてください。</li><li class=\\\"z-non-dot\\\">3. はずしたディスペンサーをレフィル容器にセットしてしっかり閉めてください。</li><li class=\\\"z-non-dot\\\">4. レフィル容器のキャップは捨ててください。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>パワライジング コンセントレート N の50mLサイズ以外のディスペンサーはご使用になれません。</li><li class=\\\"z-kome-1\\\">本品はリニューアル品です。2018年リニーアル前の(50mLサイズ)ディスペンサーも、ご使用いただけません。</li><li>目に入らないように注意し、入ったときはすぐに洗い流してください。</li><li>使い始めは中味が出るまでディスペンサーをゆっくりと奥まで数回押してください。</li><li>ご使用後は、容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li><li>日のあたるところや高温のところに置かないでください。</li><li>火気にご注意ください。</li><li>ディスペンサーは洗わずに、そのままセットしてください。 </li><li>前の容器に残った中味は、レフィル容器に移し替えないでください。 </li><li>清潔にご使用いただくため2～3回付け替えた後、新しい本体をお求めください。</ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"master\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dwac57a483/products/13917/13917_S_02.jpg\"],\"price\":{\"currency\":\"Japanese Yen\",\"value\":12650},\"brand\":\"SHISEIDO フューチャーソリューション LX\",\"addToBagUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Cart-AddProduct?pid=80250\",\"prodUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/future-solution-lx-concentrated-balancing-softener-e-80250.html?lang=jp\",\"averageStars\":null,\"information\":{\"category\":\"プレミアムシリーズ\",\"subcategory\":\"アイテム\",\"subsubcategory\":\"化粧水＆保湿液\",\"size\":\"170mL\",\"color\":\"\",\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"IN_STOCK\",\"isOrderable\":true}},\"en\":{\"name\":\"コンセントレイティッド バランシングソフナーe\"