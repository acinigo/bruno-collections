:\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Cart-AddProduct?pid=4514254608401\",\"prodUrl\":\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/white-lucent-brightening-eye-cream-4514254608401.html?lang=jp\",\"averageStars\":null,\"information\":{\"category\":\"スキンケア\",\"subcategory\":\"シリーズ\",\"subsubcategory\":\"ホワイトルーセント\",\"size\":\"15g\",\"color\":\"\",\"reviewCount\":null},\"other\":{\"autoReplen\":\"NO\",\"outOfStock\":\"IN_STOCK\",\"isOrderable\":true}}},{\"code\":\"4514254683897\",\"tags\":[],\"ja\":{\"name\":\"パワーブライトニング マスク\",\"shortDescription\":\"イオンフォーステクノロジー採用の薬用美白マスク\",\"longDescription\":\"<div class=\\\"container pdp-description type-unrich z-overview-info-tabs\\\"><div id=\\\"overview\\\" class=\\\"row\\\"><div class=\\\"z-content-wrap\\\"><nav class=\\\"overview-box z-overview-box z-hide-for-small-only\\\"><ul><li class=\\\"is-open\\\"><a href=\\\"#z-tabcontent1\\\">商品について</a></li><li class=\\\"\\\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li></ul></nav><div class=\\\"z-overview-content\\\"><a href=\\\"#z-tabcontent1\\\" class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\"><span>商品について</span></a><div id=\\\"z-tabcontent1\\\" class=\\\"pdp-content-section is-open\\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-7 z-column\\\"><p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\">シートに含まれたエッセンスが角層をたっぷり浸し、はがした後優れたトリートメント効果を実感できる薬用美白マスクです。<br />導入美容の考え方に着目した技術、イオンフォーステクノロジーを採用。さらに美白成分を肌の奥へ届け、メラニンの生成を抑え、日焼けによるシミ・そばかすを防ぎます。<br /><br />○イオンフォーステクノロジーが、2つのステップで美肌効果をもたらします。<br />ステップ1：「美肌有効成分配合でたっぷり満たす」 美白有効成分4MSK（4-メトキシサリチル酸カリウム塩）が、メラニンの生成を効果的に抑制します。<br />ステップ2：「肌の乱れを整え、なめらかでつやのある肌に導く」 シミのもととなるメラニン色素がスムーズに排出されるよう、肌の生まれ変わりをサポートします。</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\"></p></div><div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\"><div class=\\\"z-overview-box__full-ingredients\\\"><div class=\\\"keyingredients z-keyingredients\\\"><dl><dt>原産地</dt><dd>： 日本</dd></dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/4514254683897-full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><!--/#z-tabcontent1--><a href=\\\"#z-tabcontent2\\\" class=\\\"z-accordion-toggle z-show-for-small-only \\\"><span>使用方法</span></a><div id=\\\"z-tabcontent2\\\" class=\\\"pdp-content-section \\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><!--<div class=\\\"adjust-row_desktop venue uni\\\">--><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>化粧水で肌を整えた後、マスクを袋から取り出し、そっと広げます。マスク上部のこめかみの部分を持ち、目と鼻の位置を合わせて軽くおさえるようにしてのせます。</li><li>マスクの下部の左右を持ち、フェースラインに沿って、こめかみに向かってフィットさせます。さらに顔全体を手のひらでおさえ、マスクを密着させます。</li><li>約10分後にマスクをはがし、肌に残った美容液を軽くなじませた後、手のひらで顔全体を包み込むようにプレスします。<li class=\\\"z-kome-2\\\">美容液をたっぷりと含ませていますので、マスクを袋から取り出すときは、液だれにご注意ください。</li><li class=\\\"z-kome-1\\\">肌にフィットしやすい伸張性のあるシートのため、広げる時は力を加えすぎず、そっと広げてください。</li><li class=\\\"z-kome-1\\\">週に1～2回を目安にお使いください。（毎日でもお使いいただけます。）</li><li class=\\\"z-kome-1\\\">紫外線などのダメージを感じたときは、すぐにお使いいただくと効果的です。（日やけ後は、肌の赤みやひりつきがおさまってからお使いください。）</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>お肌に傷やはれもの・湿しん・色抜け（白斑等）や黒ずみなどの異常が生じていないかよく注意して使用してください。お肌に合わないときは、使用を中止し、皮ふ科医などにご相談ください。</li><li>袋から取り出したマスクはすぐにお使いください。衛生上、一度使用したマスクはくり返しお使いにならないでください。</li><li>刺激を感じたら、すぐにご使用をおやめください。</li><li>マスクの液が目に入らないようご注意ください。もし入った場合は、すぐに水かぬるま湯で洗い流してください。</li><li>高温・多湿のところや直射日光のあたるところにおかないでください。</ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script