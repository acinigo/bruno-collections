on \\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><!--<div class=\\\"adjust-row_desktop venue uni\\\">--><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>毎日の朝、夜のお手入れに、化粧水で肌を整えてから、乳液またはクリームの前にお使いください。</li><li>他の美容液と併用される場合は、アルティミューン パワライジング コンセントレート Nを先にお使いください。</li><li>ディスペンサー2回押し分を手にとり、顔全体にていねいに均一になじませます。</li><li class=\\\"z-komidashi\\\">レフィル容器へのディスペンサーのセット方法</li><li class=\\\"z-non-dot\\\">1. レフィル容器のキャップをはずします。</li><li class=\\\"z-non-dot\\\">2. 使い終わった本体容器を片方の手で押さえながら、ディスペンサーの下の部分をもち、回してはずしてください。</li><li class=\\\"z-non-dot\\\">3. はずしたディスペンサーをレフィル容器にセットしてしっかり閉めてください。</li><li class=\\\"z-non-dot\\\">4. レフィル容器のキャップは捨ててください。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>目に入らないように注意し、入ったときはすぐに洗い流してください。</li><li>使い始めは中味が出るまでディスペンサーをゆっくりと奥まで数回押してください。</li><li>ご使用後は、容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li><li>日のあたるところや高温のところに置かないでください。</li><li>火気にご注意ください。</li><li class=\\\"z-komidashi\\\">レフィルについて</li><li>パワライジング コンセントレート N の50mLサイズ以外のディスペンサーはご使用になれません。</li><li class=\\\"z-kome-1\\\">本品はリニューアル品です。2018年リニューアル前の（50mLサイズ）ディスペンサーも、ご使用いただけません。</li><li>ディスペンサーは洗わずに、そのままセットしてください。 </li><li>前の容器に残った中味は、レフィル容器に移し替えないでください。 </li><li>清潔にご使用いただくため2～3回付け替えた後、新しい本体をお求めください。</li></ul></div><!--</div>--></div></div></div><!--/#z-tabcontent2--></div><!--/.z-overview-content--></div><!--/.content-wrap--></div><!--/.overview--></div><!--/.z-overview-info-tabs--><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script><script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\",\"type\":\"master\",\"images\":[\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.static/-/Sites-itemmaster_Visualizer 4.0/default/dw368b31c3/products/14534/14534_S_08.jpg\",\"https://dev29-asiacommerce-shiseido.demand