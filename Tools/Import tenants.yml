    <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li>朝と夜のお手入れの最後に、パール粒1コ分(0.3g)を指先にとり、目や口のまわりなど、シワやシミなどが気になる部分にやさしくなじませます。</li>\\r\\n                                    <li class=\\\"z-kome-2\\\">朝お使いになる場合は、レチノールの効果を守るために、ご使用後に紫外線カット効果のある化粧品をお使いください。</li><br>\\r\\n                                    <li>開封方法<br>（1）キャップを開け、ピンクのリングをはずし、捨ててください。<br>（2）キャップをチューブにセットし、根もとの凹凸部分が見えなくなるまでねじ込みます。キャップをはずすと、中栓がセットされています。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>目の中に入らないようご注意ください。</li>\\r\\n                                    <li>ご使用後はチューブの口もとをきれいにふき、キャップをきちんと閉めてください。</li>\\r\\n                                    <li>直射日光にあたって肌に異常が現れた時には、ご使用をおやめください。</li>\\r\\n                                    <li>直射日光のあたるところや高温多湿のところには置かないでください。</li>\\r\\n                                    <li class=\\\"z-kome-2\\\">これまでレチノール類を含む商品でトラブルがあったかたや、皮ふトラブルを起こしやすいかたは、ご使用をお控えください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">初めて使用するときや肌が敏感なときは、最初の2週間は2～3日間隔で夜のみ、次の2週間は毎夜と、少しずつ使用回数を増やすことをおすすめします。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">他のレチノールが配合された商品と併用するときは、一度に複数品の併用は避け、1品ずつ様子を見ながらお使いください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">使用回数・使用量を守って正しくお使いください。</li>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static