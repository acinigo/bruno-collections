_aboutproducts\\\">独自のウェットフォース テクノロジーを採用。汗や水に反応し、紫外線防御膜を強化します。※<br />ウォーターベースのみずみずしさでべたつく肌にも心地よい使用感。<br />お手持ちの洗浄料で落とせます。<br />ウォータープルーフ。化粧下地にも。</p><p class=\\\"overview-box__long-description__attention z-overview-box__long-description__attention\\\">※肌上のサンスクリーン膜の均一性を高め、安定に保つ。</p></div><div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\"><div class=\\\"z-overview-box__full-ingredients\\\"><div class=\\\"keyingredients z-keyingredients\\\"><dl><dt>原産地</dt><dd>： 日本</dd></dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/s/shiseido_global_jp/4514254051177-full-ingredients.html?lang=jp\\\" title=\\\"全成分表示を見る\\\">成分</a></div></div></div></div></div><!--/#z-tabcontent1--><a href=\\\"#z-tabcontent2\\\" class=\\\"z-accordion-toggle z-show-for-small-only \\\"><span>使用方法</span></a><div id=\\\"z-tabcontent2\\\" class=\\\"pdp-content-section \\\"><div class=\\\"z-overview-content-inner row z-bodycopy\\\"><div class=\\\"z-small-12 z-medium-12 z-column\\\"><!--<div class=\\\"adjust-row_desktop venue uni\\\">--><div class=\\\"z-overview-box__full-description\\\"><p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p><ul><li>顔や首には、お手入れの最後に適量を手のひらにとり、ていねいになじませます。</li><li>からだに使用するときは、容器から直接肌の上に線状にとり、手のひらで大きく円を描くように広げながら、ムラなくのばします。</li><li>お手持ちの洗浄料でスムーズに落とせます。</li></ul><p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p><ul><li>本品にはメントールを配合していますので、メントールに刺激などを感じやすい方はご使用をお控えください。</li><li>ご使用後は容器の口もとをきれいに拭き、キャップをきちんと閉めてください。</li><li>衣服についた場合は、すぐに洗剤でていねいに洗ってください。</li><li>乳幼児の手の届かないところに置いてください。</li><li>日のあたるところや高温のところに置かないでください。</li><li>火気にご注意ください。</li><li class=\\\"z-kome-2\\\">商品のSPF表示及びPA表示は、国際SPF試験法に定められている塗布量1cm&sup2;あたり2mgを皮ふに塗布して測定した結果です。</li><li class=\\\"z-komidashi\\\">紫外線に関する注意表示</li><li>日にあたる前に、均一に塗布してください。</li><li>紫外線防御効果を維持するために、特に泳いだりタオルで拭いた後などは、頻繁に重ね付けしてください。</li><li>使用量が少ないと、十分な紫外線防御効果が得られません。</li><li>日焼け止め商品のご使用中も、長時間日光にあたるのは避けましょう。</li><li>日光にあたりすぎると、健康に深刻な影響を与えます。</li><li>日中の一番暑い時