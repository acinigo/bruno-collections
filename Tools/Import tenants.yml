r\\n2. 使い終わった本体容器を片方の手で押さえながら、ディスペンサーの下の部分をもち、回してはずしてください。\\r\\n</li><li class=\\\"z-kome-1\\\">\\r\\nディスペンサーを外した時、本体容器の口もとにリング状の白いパッキンが残ることがあります。白いパッキンは捨てずに新しいレフィル容器の口もとにのせてください。\\r\\n</li>\\r\\n<li class=\\\"z-non-dot\\\">\\r\\n3. はずしたディスペンサーをレフィル容器にセットして、しっかり閉めてください。\\r\\n</li><li class=\\\"z-non-dot\\\">\\r\\n4. レフィル容器のキャップは捨ててください。\\r\\n</li>\\r\\n\\r\\n</ul>\\r\\n\\r\\n<p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n<ul>\\r\\n<li>ご使用後は容器の口もとをきれいに拭き、カバーキャップをきちんと閉めてください。</li>\\r\\n<li>日のあたるところや高温のところに置かないでください。</li>\\r\\n<li>天然成分を配合しているため、まれに沈殿物が生じることがありますが、製品の品質や効果には問題ありません。</li>\\r\\n\\r\\n<li class=\\\"z-komidashi\\\">\\r\\nレフィルについて\\r\\n</li>\\r\\n<li>レフィルは必ず本体のディスペンサーをセットしてご使用ください。</li>\\r\\n<li>ディスペンサーは洗わずに、そのままセットしてください。</li>\\r\\n<li>前の容器に残った中味は、レフィル容器に移し替えないでください。</li>\\r\\n<li>清潔にご使用いただくため2～3回付け替えた後、新しい本体容器にお取替えいただくことをおすすめします。</li>\\r\\n<li>SHISEIDO トリートメントソフナー以外のディスペンサーはご使用になれません。</li>\\r\\n<li>トリートメントソフナー（レフィル）はSHISEIDO トリートメントソフナーのディスペンサーをお使いください。</li>\\r\\n</ul>\\r\\n\\r\\n</div><!--</div>-->\\r\\n</div>\\r\\n</div>\\r\\n</div>\\r\\n<!--/#z-tabcontent2--></div>\\r\\n<!--/.z-overview-content-->\\r\\n</div><!--/.content-wrap-->\\r\\n</div><!--/.overview-->\\r\\n</div>\\r\\n<!--/.z-overview-info-tabs-->\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\">\\r\\n</script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\">\\r\\n</script>\\r\\n\\r\\n<style>@media(max-width: 768px) { .pdp-page .z-overview-info-tabs #overview {margin-bottom:0;}}</style>\\r\\n\\r\\n<style>\\r\\n    .z-overview-content-anchor {\\r\\n        margin-top: 18px;\\r\\n    }\\r\\n    .z-overview-content-anchor a {\\r\\n        color: inherit;\\r\\n        text-decoration: underline;\\r\\n        position: relative;\\r\\n    }\\r\\n    .z-overview-content-anchor a:after {\\r\\n        content: '';\\r\\n        display: block;\\r\\n        position: a