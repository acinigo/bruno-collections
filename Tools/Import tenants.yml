\"><a href=\\\"#z-tabcontent2\\\">使用方法</a></li>\\r\\n                    <li class=\\\"\\\"><a class=\\\"z-js-overview-nontab z-js-overview_anchor\\\" href=\\\"#z-PDP_21AW_QandA_BOP_01\\\">Q&A</a></li>\\r\\n                </ul>\\r\\n            </nav>\\r\\n            <div class=\\\"z-overview-content\\\"><a class=\\\"z-accordion-toggle z-show-for-small-only is-open\\\" href=\\\"#z-tabcontent1\\\"><span>商品について</span></a>\\r\\n                <div class=\\\"pdp-content-section is-open\\\" id=\\\"z-tabcontent1\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-7 z-column\\\">\\r\\n                            <p class=\\\"z-attention\\\">本商品はお客様のお悩みに応じて使用対象有無の確認及び使用方法のポイントお伝えの為、店頭でのカウンセリングを強く推奨いたします。</p><p class=\\\"overview-box__long-description__aboutproducts z-overview-box__long-description__aboutproducts\\\"><br>SHISEIDO独自の「3D フィックス テクノロジー」を搭載。簡単な3ステップでスキンフィルムを形成、歳とともに刻まれる目の下のふくらみにぴたっと密着してカバーします。たるんだ目もとが目立たなくなり、顔全体の印象を若わかしく。使うたび、目もとにハリと明るさを与えます。<br><u>※メイク効果であり、スキンケア効果ではありません。</u><br><br>\\r\\n［セット内容］<br>・SHISEIDO ビオパフォーマンス ステップ0 紙おしろい<br>・SHISEIDO ビオパフォーマンス ステップ1＜目もと用美容液＞<br>・SHISEIDO ビオパフォーマンス ステップ2＜目もと用美容液＞</p>\\r\\n                        </div>\\r\\n                        <div class=\\\"z-small-12 z-medium-4 z-overview-content-ingredients \\\">\\r\\n                            <div class=\\\"z-overview-box__full-ingredients\\\">\\r\\n                                <div class=\\\"keyingredients z-keyingredients\\\">\\r\\n                                    <dl>\\r\\n                                        <dt>原産地</dt>\\r\\n                                        <dd>：日本</dd>\\r\\n                                        <!--<dt>使用期間</dt>\\r\\n                                        <dd>：4クリック/回の場合（約110回）<br>5クリック/回の場合（約90回）<br>6クリック/回の場合（約75回）</dd>-->\\r\\n                                     </dl><a class=\\\"view-all\\\" href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=4514254112946-full-ingredients\\\" title=\\\"全成分表示を見る\\\">成分</a>\\r\\n                                </div>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div><a class=\\\"z-accordion-toggle z-show-for-small-only \\\" href=\\\"#z-tabcontent2\\\"><span>使用方法</span></a>\\r\\n                <div class=\\\"pdp-content-section \\\" id=\\\"z-tabcontent2\\\">\\r\\n                    <div class=\\\"z-overview-content-inner row z-bodycopy\\\">\\r\\n                        <div class=\\\"z-small-12 z-medium-12 z-column\\\">\\r\\n                            <div class=\\\"z-overview-box__full-description\\\">\\r\\n                                <div class=\\\"z-overview-box__howto\\\">\\r\\n                                    <p class=\\\"z-overview-box__howto_title\\\">HOWTO動画</p>\\r\\n                                    <div class=\\\"z-overview-box__howto_note\\\">\\r\\n                                        <p>※メイク効果であり、スキンケア効果ではありません。</p>\\r\\n                                    </div>\\r\\n                                    <ul class=\\\"z-overview-box__howto_movie_list\\\">\\r\\n                                        <li>\\r\\n                                            <p class=\\\"z-overview-box__howto_movie_name\\\">セカンドスキンの使い方</p>\\r\\n                                            <div class=\\\"z-overview-box__player\\\">\\r\\n                                                <video data-video-id=\\\"6269420843001\\\" data-account=\\\"6006779178001\\\" data-player=\\\"aSg8glOJFT\\\" data-embed=\\\"default\\\" data-application-id id=\\\"v6269420843001_overview\\\" class=\\\"video-js video z_video_manual_playback\\\" poster=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/images/pdp/22AW/BOP/PDP_22AW_howto_BOP_EyeLipCare_01.jpg\\\" data-application-id controls muted playsinline>\\r\\n                                            </div>\\r\\n                                        </li>\\r\\n                                        <li>\\r\\n                                            <p class=\\\"z-overview-box__howto_movie_name\\\">セカンドスキンの落とし方</p>\\r\\n                                            <div class=\\\"z-overview-box__player\\\">\\r\\n                                                <video data-video-id=\\\"6269422600001\\\" data-account=\\\"6006779178001\\\" data-player=\\\"aSg8glOJFT\\\" data-embed=\\\"default\\\" data-application-id id=\\\"v6269422600001_overview\\\" class=\\\"video-js video z_video_manual_playback\\\" poster=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/images/pdp/22AW/BOP/PDP_22AW_howto_BOP_EyeLipCare_02.jpg\\\" data-application-id controls muted playsinline>\\r\\n                                            </div>\\r\\n                                        </li>\\r\\n                                    </ul>\\r\\n                                </div>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse\\\">使用方法</p>\\r\\n                                <ul>\\r\\n                                    <li class=\\\"z-kome-1\\\">この商品は、メイクアップを仕上げた後に使用します。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ステップ0 紙おしろい</li>\\r\\n                                    <li>模様のない方に粉が付いていますので、その面を目の下に軽く押しあてます。指で触れて、肌がさらっとしていることをご確認ください。もう片方の目もとにも同様に行います。片方の目もとにつき1枚使用します。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ステップ1、2の前に</li>\\r\\n                                    <li>塗る範囲：目袋の外側にはみ出さないように塗ります。</li>\\r\\n                                    <li>留意点：目頭、目尻、目のきわ、まつ毛の下、ほおなどに塗らないように注意します。</li>\\r\\n                                    <li>斜線部分に塗ってしまった場合：一度ティッシュペーパーでアプリケーターについたジェルをふき取り、そのアプリケーターを縦に使いながら、はみ出した部分のジェルを取り除きます。</li>\\r\\n                                    <li>使用量の確認：この商品は目袋の大きさによって、使用量が異なります。商品に同封している使用方法書面にて、ご自身の目袋の大きさをご確認の上、使用量（クリック数）をご確認ください。<br><p class=\\\"z-consultation\\\"><a href=\\\"https://dev29-asiacommerce-shiseido.demandware.net/on/demandware.store/Sites-shiseido_global_jp-Site/ja_JP/Page-Show?cid=consultation-bio-performance-second-skin\\\">詳しくはこちら</a></p></li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ステップ1（白い容器）</li>\\r\\n                                    <li>使用量：下部を回し、カチッと音がするのを1回と数えながら、上記「使用量の確認」で選んだ回数分を回します。</li>\\r\\n                                    <li>アプリケーターに取り出す：突起が1本ついた側に確認した量を取り出します。</li>\\r\\n                                    <li>のばし方：アプリケーターを寝かせるように動かし、ジェルが平らになるように軽くのばします。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">もう片側の目にも同様に行います。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ステップ2（青い容器）</li>\\r\\n                                    <li>使用量：下部を回し、カチッと音がするのを1回と数えながら、確認した回数分を回します。</li>\\r\\n                                    <li>アプリケーターに取り出す：突起が2本ついた側に確認した量を取り出します。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">ステップ1を使用した反対側を使います。</li>\\r\\n                                    <li>のばし方：同様にのばします。ステップ1を塗ったところに、重ねてのばします。ステップ1にステップ2を重ねることでセカンドスキンが形成されます。</li>\\r\\n                                     <li class=\\\"z-kome-1\\\">もう片側の目にも同様に行います。セカンドスキンにしわができないように、5分程度は表情を動かさないようにしてください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">おすすめの落とし方</li>\\r\\n                                    <li>コットンにお手持ちの部分用メイク落とし、またはSHISEIDO インスタント アイ＆リップ メーキャップリムーバーをやや多めに含ませ、二つ折りにして、セカンドスキンの上に15秒ほど置きます。セカンドスキンが白くふやけているのを確認します。ふやけていないようであれば、再度リムーバーを含ませたコットンでおさえます。コットンで端をめくった後、指でセカンドスキンを少しずつ剥がします。残った部分は、コットンの端を使い、肌をこすらないように、やさしくはがします。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">もう片側の目もとも同様に繰り返してください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">はがしたセカンドスキンは排水溝に流さないでください。</li>\\r\\n                                    <li class=\\\"z-non-dot\\\"><br>洗い流し専用のクレンジングオイルをご使用になる場合</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">通常よりも多めの量でセカンドスキンとやさしくなじませ、白くふやけたら、指ではがしてすててください。\\r\\n                                    <li class=\\\"z-kome-1\\\">はがしたセカンドスキンは排水溝に流さないでください。</li>\\r\\n                                    <li class=\\\"z-kome-1\\\">はがした後は水またはぬるま湯で洗い流してください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ファンデーションの直し方</li>\\r\\n                                    <li>セカンドスキンがついている部位とその境界線に触れないようにやさしくファンデーションをのばしてください。セカンドスキンに触れると、破けたりはがれの原因になることがあります。</li>\\r\\n                                </ul>\\r\\n                                <p class=\\\"z-overview-box__full-description__howtouse2\\\">使用上の注意</p>\\r\\n                                <ul>\\r\\n                                    <li>日のあたるところや高温のところに置かないでください。</li>\\r\\n                                    <li>乳幼児の手の届かないところに置いてください。</li>\\r\\n                                    <li>ステップ0 紙おしろい、ステップ1、ステップ2をセットしている白いケースは、環境に配慮し、紙素材でできているため、水にぬれると形がくずれるおそれがあります。形がくずれてしまったケースはすててください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ステップ0 紙おしろい</li>\\r\\n                                    <li>紙おしろいに水がかからないようにご注意ください。</li>\\r\\n                                    <li>模様のない方に粉がついています。</li>\\r\\n                                    <li>一度使用した紙おしろいは再度使用しないでください。</li>\\r\\n                                    <li>衣服につくと粉末で白くなることがありますので、ご注意ください。</li>\\r\\n                                    <li class=\\\"z-komidashi\\\">ステップ1、ステップ2</li>\\r\\n                                    <li>使用後は容器の口もととアプリケーターをきれいにふき、キャップをきちんと閉めて保管してください。</li>\\r\\n                                    <li>ステップ1とステップ2のキャップのつけ間違いにご注意ください。つけ間違えると、成分が固まることがあります。</li>\\r\\n                                    <li>キャップを付けた状態でダイヤルを回さないでください。</li>\\r\\n                                    <li>一度出したジェルは戻りません。</li>\\r\\n                                    <li>ステップ1、ステップ2の容器の内側に青色が見えてきたら使い終わりのしるしです。</li>\\r\\n                                    <li>ジェルが衣服などについた場合はすぐにふき取った後、洗濯してください。長時間放置すると、シミになることがあります。</li>\\r\\n                                    <li>絶対に冷凍庫には入れないでください。凍ってしまうと品質が劣化するおそれがあります。</li>\\r\\n                                    <li>しばらくお使いにならなかった場合、容器の口もとに残った中の成分が蒸発し、膜になって付着することがあります。品質に問題はございませんので、よくふき取ってご使用ください。</li>\\r\\n                                    <li>使用する環境（温度・湿度等）や個人差によりはり感を強く感じる場合があります。</li>\\r\\n                                    <li>容器の中に水が入らないようにご注意ください。</li>\\r\\n                                    <li>排水溝の詰まりの原因になるので、はがしたセカンドスキンは排水溝に流さないでください。</li>\\r\\n                                    <li>一度できたセカンドスキンの上からステップ1やステップ2を重ね塗りしないでください。</li>\\r\\n                                    <li>化粧直しをする場合は、セカンドスキンの上や周囲を避けて、ファンデーションやメイクアップ製品をつけ直してください。</li>\\r\\n                                    <li>塗る範囲が広すぎると、しわやはがれの原因になります。その場合は、一度落としてからつけ直してください。</li>\\r\\n                                    <li>水にぬれると白くなったりはがれやすくなりますので、プールやお風呂でのご使用は避けてください。</li>\\r\\n                                    <li>セカンドスキンを塗布したまま、おやすみにならないでください。</li>\\r\\n                                    <li>火気にご注意ください。</li>\\r\\n                                    <li>目に入らないようにご注意ください。もし入った場合は、すぐに水がぬるま湯で洗い流してください。</li>\\r\\n                                    <li>お肌に合わないときは使用をおやめください。</li>\\r\\n                                </ul>\\r\\n                            </div>\\r\\n                        </div>\\r\\n                    </div>\\r\\n                </div>\\r\\n                <a class=\\\"z-accordion-toggle z-show-for-small-only z-js-overview-nontab z-js-overview_anchor\\\" href=\\\"#z-PDP_21AW_QandA_BOP_01\\\"><span>Q&A</span></a>\\r\\n            </div>\\r\\n        </div>\\r\\n    </div>\\r\\n</div>\\r\\n<script src=\\\"//players.brightcove.net/6006779178001/aSg8glOJFT_default/index.min.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\"></script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/additional-pdp-common.js\\\"></script>\\r\\n<script defer>\\r\\n    // 2207追加\\r\\n    window.addEventListener('DOMContentLoaded', function() {\\r\\n        $('.z-js-overview_anchor[href^=\\\"#\\\"]').on('click', function(){\\r\\n            var adjust = 0;\\r\\n            var speed = 800;\\r\\n            var href = $(this).attr(\\\"href\\\");\\r\\n            var target = $(href == \\\"#\\\" || href == \\\"\\\" ? 'html' : href);\\r\\n            var position = target.offset().top + adjust;\\r\\n            $('body,html').animate({scrollTop:position}, speed, 'swing');\\r\\n            return false;\\r\\n        });\\r\\n    });\\r\\n</script>\\r\\n<style>@media(max-width: 768px) { .pdp-page .z-overview-info-tabs #overview {margin-bottom:0;}\\r\\n.pdp-page #contentzone3 .tips-and-tutorials {padding-top:0!important;}\\r\\n}\\r\\n</style>\\r\\n\\r\\n<style>\\r\\n    .z-consultation a {\\r\\n        color: inherit;\\r\\n        text-decoration: underline;\\r\\n        position: relative;\\r\\n    }\\r\\n\\r\\n    .z-attention {\\r\\n        color: #c8102e;\\r\\n        position: relative;\\r\\n    }\\r\\n    /* 2207追加 */\\r\\n    .pdp-page .z-overview-info-tabs #overview a.z-accordion-toggle.z-js-overview-nontab {\\r\\n    border-top: 0px solid #cccccc;\\r\\n    }\\r\\n    .pdp-page .z-overview-info-tabs #overview a.z-accordion-toggle.z-js-overview-nontab::before,\\r\\n    .pdp-page .z-overview-info-tabs #overview a.z-accordion-toggle.z-js-overview-nontab::after {\\r\\n    display: none!important;\\r\\n    }\\r\\n    /* 2208追加 */\\r\\n    .z-overview-box__howto_title,\\r\\n    .z-overview-box__howto_movie_name {\\r\\n        font-weight: bold;\\r\\n        text-align: center;\\r\\n        line-height: 1;\\r\\n    }\\r\\n    .z-overview-box__howto_note {\\r\\n        text-align: center;\\r\\n    }\\r\\n    .z-overview-box__howto_note p {