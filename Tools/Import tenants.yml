問題ありません。</li>\\r\\n<li class=\\\"z-komidashi\\\">\\r\\nレフィルについて\\r\\n</li>\\r\\n<li>レフィルは必ず本体のディスペンサーをセットしてご使用ください。</li>\\r\\n<li>ディスペンサーは洗わずに、そのままセットしてください。</li>\\r\\n<li>前の容器に残った中味は、レフィル容器に移し替えないでください。</li>\\r\\n<li>清潔にご使用いただくため2～3回付け替えた後、新しい本体容器にお取替えいただくことをおすすめします。</li>\\r\\n<li>SHISEIDO トリートメントソフナー以外のディスペンサーはご使用になれません。</li>\\r\\n<li>トリートメントソフナー  エンリッチド（レフィル）はSHISEIDO トリートメントソフナー  エンリッチドのディスペンサーをお使いください。</li>\\r\\n</ul>\\r\\n\\r\\n</div><!--</div>-->\\r\\n</div>\\r\\n</div>\\r\\n</div>\\r\\n<!--/#z-tabcontent2--></div>\\r\\n<!--/.z-overview-content-->\\r\\n</div><!--/.content-wrap-->\\r\\n</div><!--/.overview-->\\r\\n</div>\\r\\n<!--/.z-overview-info-tabs-->\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/pdp-ja.js\\\">\\r\\n</script>\\r\\n<script src=\\\"/on/demandware.static/-/Sites-shiseido_global_jp-Library/default/js/overview.js\\\">\\r\\n</script>\\r\\n\\r\\n<style>@media(max-width: 768px) { .pdp-page .z-overview-info-tabs #overview {margin-bottom:0;}}\\r\\n\\r\\n    .z-overview-content-anchor {\\r\\n        margin-top: 18px;\\r\\n    }\\r\\n    .z-overview-content-anchor a {\\r\\n        color: inherit;\\r\\n        text-decoration: underline;\\r\\n        position: relative;\\r\\n    }\\r\\n    .z-overview-content-anchor a:after {\\r\\n        content: '';\\r\\n        display: block;\\r\\n        position: absolute;\\r\\n        top: 0;\\r\\n        bottom: 0;\\r\\n        margin: auto 0;\\r\\n        border-top: 2px solid #888;\\r\\n        border-right: 2px solid #888;\\r\\n        -webkit-transform: rotate(135deg) translate(-5px, 5px);\\r\\n        transform: rotate(135deg) translate(-5px, 5px);\\r\\n    }\\r\\n    @media (min-width: 769px) {\\r\\n        .z-overview-content-anchor a:after {\\r\\n            top: 6px;\\r\\n            right: -22px;\\r\\n            width: 13px;\\r\\n            height: 13px;\\r\\n        }\\r\\n    }\\r\\n    @media (max-width: 768px) {\\r\\n        .z-overview-content-anchor a