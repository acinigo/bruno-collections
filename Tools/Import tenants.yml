ath.round((bS_pores_raw - 35.58) * (100.0 - 65.0) / (81.39 - 35.58) + 65.0);\\n    }\\n  } else {\\n    if (bS_pores_raw < 39.83) {\\n      bS_pores = Math.round((bS_pores_raw + 6.18) * (65.0 - 30.0) / (39.83 + 6.18) + 30.0);\\n    } else {\\n      bS_pores = Math.round((bS_pores_raw - 39.83) * (100.0 - 65.0) / (91.53 - 39.83) + 65.0);\\n    }\\n  }\\n  bS_pores = bS_pores > 100.0 ? 100.0 : (bS_pores < 30.0 ? 30.0 : bS_pores);\",\"bSRoughness\":\"  bS_roughness_raw = 100.0 - roughness;\\n  if (isMale) {\\n    if (bS_roughness_raw < 27.5) {\\n      bS_roughness = (bS_roughness_raw + 81.9) * (65.0 - 30.0) / (27.5 + 81.9) + 30.0;\\n    } else {\\n      bS_roughness = (bS_roughness_raw - 27.5) * (100.0 - 65.0) / (83.2 - 27.5) + 65.0;\\n    }\\n  } else {\\n    if (bS_roughness_raw < 34.4) {\\n      bS_roughness = (bS_roughness_raw + 67.1) * (65.0 - 30.0) / (34.4 + 67.1) + 30.0;\\n    } else {\\n      bS_roughness = (bS_roughness_raw - 34.4) * (100.0 - 65.0) / (92.3 - 34.4) + 65.0;\\n    }\\n  }\\n  bS_roughness = bS_roughness > 100.0 ? 100.0 : (bS_roughness < 30.0 ? 30.0 : bS_roughness);\",\"bSDehydration\":\"  bS_dehydration_raw = Qre_dehydration;\\n  if (isMale) {\\n    if (bS_dehydration_raw < 81.0) {\\n      bS_dehydration = (bS_dehydration_raw - 30.0) * (65.0 - 30.0) / (81.0 - 30.0) + 30.0;\\n    } else {\\n      bS_dehydration = (bS_dehydration_raw - 81.1) * (100.0 - 65.0) / (100.0 - 81.0) + 65.0;\\n    }\\n  } else {\\n    if (bS_dehydration_raw < 61.0) {\\n      bS_dehydration = (bS_dehydration_raw - 30.0) * (65.0 - 30.0) / (61.0 - 30.0) + 30.0;\\n    } else {\\n      bS_dehydration = (bS_dehydration_raw - 61.0) * (100.0 - 65.0) / (100.0 - 61.1) + 65.0;\\n    }\\n  }\\n  bS_dehydration = bS_dehydration > 100.0 ? 100.0 : (bS_dehydration < 30.0 ? 0.0 : bS_dehydration);\",\"bSVisiblePores\":\"age = date_birth;\\nif (age < 35) {\\n    90 - FCA_Pores * 0.9\\n    bS_visible_pores_raw = 90.0 - 0.9 * pores;\\n  } else {\\n    bS_visible_pores_raw = 110.0 - 1.1 * pores;\