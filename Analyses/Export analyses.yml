info:
  name: Export analyses
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/api/analysis/export"
  headers:
    - name: user
      value: Test
    - name: channel
      value: Postman
    - name: tenantId
      value: 1c9491f6-fd46-44eb-a4da-b70f09eee8b5
  body:
    type: multipart-form
    data:
      - name: user
        type: text
        value: Test
      - name: channel
        type: text
        value: Postman
  auth:
    type: bearer
    token: "{{acces_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
