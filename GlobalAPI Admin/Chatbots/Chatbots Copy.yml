      \                    \"productUsage\": \"- Use the spatula to scoop two pearl-sized amounts, then dot the cream on the 5 points of your face: forehead, nose, chin, and both cheeks.\\r\\n- Gently smooth the cream outward over your face. Apply an additional pearl-sized amount on your neck, and sweep the cream upward from throat to jawline.\\r\\n- Use twice daily—morning & night, as the last step in your skincare routine.\\r\\n- FOR REFILL: Hold the jar with one hand and place your fingers on the protrusions on the mouth of the cap and lift out the pod. Set the new refill in place and firmly push into the jar. Peel off the inner sticker and firmly close the cap.\",\r

