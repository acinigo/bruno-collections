                      },
                      {
                          "name": "group1me",
                          "script": "$group1me = splitString(GetRecommendationGroup1ME(person.oxygen, person.sebum))"
                      },
                      {
                          "name": "group1meultimate",
                          "script": "$group1meultimate = splitString(GetRecommendationGroup1MEUltimate(person.sebum))"
                      },
