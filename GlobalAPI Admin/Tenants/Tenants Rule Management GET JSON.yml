                      },
                      {
                          "name": "group2marinecake",
                          "script": "$group2marinecake = splitString(GetRecommendationGroup2MarineCake(person.sebum))"
                      },
                      {
                          "name": "group2joined",
                          "script": "$group2joined = joinArrays($group2makeoff, $group2marinecake)"
                      },
                      {
                          "name": "group1",
                          "script": "$group1 = person.isSensitiveSkin == \"Yes\" ? $group1sensitive : joinArrays($group1me, $group1meultimate)"
                      },
                      {
                          "name": "group2",
                          "script": "$group2 = person.isSensitiveSkin == \"Yes\" ? joinArrays($group2makeoff, $group2cleansingsensitive) : joinArrays($group2joined, $group2cleansingnonsensitive)"
