info:
  name: Get analysis
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/api/analysis/"
  headers:
    - name: user
      value: Test
    - name: channel
      value: Postman
  body:
    type: multipart-form
    data:
      - name: user
        type: text
        value: Test
      - name: channel
        type: text
        value: Postman
  auth:
    type: bearer
    token: "{{acces_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
